<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script>
  'use strict';

  /* ===================================================================
     Link Checker — commands.js (event-based activation)
     Handler onMessageRead : analyse automatique + notificationMessage
     =================================================================== */

  /* -- Constantes ---------------------------------------------------- */

  var ORG_DOMAINS = ['empirys.com', 'empirys.lu', 'empirys.eu', 'empirys.fr'];

  var TRUSTED_DOMAINS = [
    'empirys.com', 'empirys.lu', 'empirys.eu', 'empirys.fr',
    'microsoft.com', 'office.com', 'outlook.com', 'live.com', 'office365.com',
    'google.com', 'gmail.com', 'linkedin.com', 'github.com',
    'apple.com', 'icloud.com', 'twitter.com', 'x.com',
    'facebook.com', 'instagram.com', 'youtube.com',
    'amazonaws.com', 'azure.com', 'cloudflare.com',
    'made-in-luxembourg.com', 'made-in-luxembourg.lu',
    'odoo.com', 'docusign.com', 'dropbox.com', 'adobe.com',
    'restez-mieux.fr', 'aka.ms',
    'netflix.com', 'spotify.com', 'paypal.com',
    'shopify.com', 'zoom.us', 'slack.com', 'teams.microsoft.com',
    'airtable.com', 'notion.so', 'asana.com', 'trello.com',
    'canva.com', 'figma.com', 'github.io', 'gitlab.com',
    'jira.com', 'monday.com'
  ];

  var SUSPICIOUS_KEYWORDS = [
    'bank', 'banque', 'paypal', 'secure', 'security', 'login',
    'signin', 'account', 'verify', 'update', 'confirm', 'alert',
    'suspend', 'locked', 'urgent', 'password', 'credential',
    'wallet', 'crypto', 'invoice', 'payment', 'billing',
    'support-', '-support', 'helpdesk', 'service-client'
  ];

  var BRAND_NAMES = [
    'microsoft', 'google', 'apple', 'amazon', 'paypal', 'netflix',
    'facebook', 'instagram', 'whatsapp', 'linkedin', 'twitter',
    'dropbox', 'adobe', 'oracle', 'salesforce', 'docusign',
    'stripe', 'shopify', 'zoom', 'slack', 'outlook', 'office365',
    'onedrive', 'sharepoint', 'teams'
  ];

  var PHISHING_KEYWORDS_SUBJECT = [
    'urgent', 'immediate', 'action requise', 'action required',
    'verif', 'confirm', 'suspend', 'bloqu', 'locked',
    'mot de passe', 'password', 'expir', 'renouvel',
    'facture', 'invoice', 'paiement', 'payment',
    'securite', 'security', 'alerte', 'alert',
    'compte', 'account', 'mise a jour', 'update',
    'remboursement', 'refund', 'gagn', 'felicitation',
    'derniere chance', 'last chance', 'limite', 'limited'
  ];

  var PHISHING_KEYWORDS_BODY = [
    'cliquez ici immediatement', 'click here immediately',
    'votre compte sera', 'your account will be',
    'dans les 24', 'within 24', 'dans les 48', 'within 48',
    'verifiez votre identite', 'verify your identity',
    'confirmer vos informations', 'confirm your information',
    'mot de passe expire', 'password expired',
    'acces non autorise', 'unauthorized access',
    'activite suspecte', 'suspicious activity',
    'cliquez sur le lien', 'click the link',
    'telecharger le document', 'download the document',
    'ouvrir la piece jointe', 'open the attachment'
  ];

  /* -- Helpers -------------------------------------------------------- */

  function getDomain(raw) {
    try {
      var s = raw.trim();
      if (!/^https?:\/\//i.test(s)) s = 'https://' + s;
      var h = new URL(s).hostname.toLowerCase().replace(/^www\./, '');
      var p = h.split('.');
      return p.length < 2 ? h : p.slice(-2).join('.');
    } catch(e) { return ''; }
  }

  function getDomainFromEmail(email) {
    if (!email) return '';
    var parts = email.split('@');
    if (parts.length < 2) return '';
    var h = parts[1].toLowerCase();
    var p = h.split('.');
    return p.length < 2 ? h : p.slice(-2).join('.');
  }

  function isTrustedDomain(domain) {
    if (!domain) return false;
    for (var i = 0; i < TRUSTED_DOMAINS.length; i++) {
      if (domain === TRUSTED_DOMAINS[i]) return true;
      if (domain.length > TRUSTED_DOMAINS[i].length &&
          domain.indexOf('.' + TRUSTED_DOMAINS[i]) === domain.length - TRUSTED_DOMAINS[i].length - 1) return true;
    }
    return false;
  }

  function isOrgDomain(domain) {
    for (var i = 0; i < ORG_DOMAINS.length; i++) {
      if (domain === ORG_DOMAINS[i]) return true;
    }
    return false;
  }

  function checkSuspiciousDomain(href, domain) {
    if (!domain || isTrustedDomain(domain)) return null;
    var domainLower = domain.toLowerCase();
    var reasons = [];

    for (var i = 0; i < SUSPICIOUS_KEYWORDS.length; i++) {
      if (domainLower.indexOf(SUSPICIOUS_KEYWORDS[i]) !== -1) {
        reasons.push('Mot-cle sensible "' + SUSPICIOUS_KEYWORDS[i] + '" dans le domaine');
        break;
      }
    }

    var domainBase = domainLower.split('.')[0];
    for (var j = 0; j < BRAND_NAMES.length; j++) {
      var brand = BRAND_NAMES[j];
      if (domainBase.indexOf(brand) !== -1 && domainBase !== brand) {
        reasons.push('Possible usurpation de marque "' + brand + '"');
        break;
      }
    }

    return reasons.length > 0 ? reasons : null;
  }

  function looksLikeUrl(t) {
    t = t.trim();
    return /^https?:\/\//i.test(t) || /^[a-z0-9][a-z0-9\-]*\.[a-z]{2,}/i.test(t);
  }

  function normalizeText(t) {
    return (t || '').toLowerCase()
      .replace(/[eéèêë]/g, 'e')
      .replace(/[aàâä]/g, 'a')
      .replace(/[iîï]/g, 'i')
      .replace(/[oôö]/g, 'o')
      .replace(/[uùûü]/g, 'u')
      .replace(/[cç]/g, 'c')
      .replace(/\s+/g, ' ');
  }

  function extractTextFromHtml(html) {
    try {
      var doc = new DOMParser().parseFromString(html, 'text/html');
      return doc.body ? doc.body.textContent : '';
    } catch(e) { return ''; }
  }

  function unwrapSafeLinks(href) {
    try {
      var u = new URL(href);
      if (u.hostname.indexOf('safelinks.protection.outlook.com') !== -1) {
        var real = u.searchParams.get('url');
        if (real) return real;
      }
    } catch(e) {}
    return href;
  }

  /* -- Analyse des liens --------------------------------------------- */

  function checkLinks(html) {
    var doc = new DOMParser().parseFromString(html, 'text/html');
    var anchors = doc.querySelectorAll('a[href]');
    var results = [];

    for (var i = 0; i < anchors.length; i++) {
      var rawHref = (anchors[i].getAttribute('href') || '').trim();
      var text = (anchors[i].textContent || '').replace(/\s+/g, ' ').trim();

      if (!rawHref || /^(mailto:|tel:|#|javascript:)/i.test(rawHref)) continue;

      var href = unwrapSafeLinks(rawHref);
      var hrefDomain = getDomain(href);
      if (!hrefDomain) continue;

      var mismatch = false;
      var suspicious = false;
      var isMismatch = false;
      var isSuspicious = false;

      if (looksLikeUrl(text)) {
        var textDomain = getDomain(text);
        if (textDomain && textDomain !== hrefDomain) {
          mismatch = true;
          isMismatch = true;
        }
      }

      var suspiciousReasons = checkSuspiciousDomain(href, hrefDomain);
      if (suspiciousReasons && !isTrustedDomain(hrefDomain)) {
        suspicious = true;
        isSuspicious = true;
        if (!mismatch) mismatch = true;
      }

      results.push({
        hrefDomain: hrefDomain,
        mismatch: mismatch,
        isMismatch: isMismatch,
        isSuspicious: isSuspicious
      });
    }
    return results;
  }

  /* -- Integrite du mail --------------------------------------------- */

  function checkIntegrity(senderEmail, subject, html, links) {
    var checks = [];
    var senderDomain = getDomainFromEmail(senderEmail);

    // Expediteur
    var isInternal = isOrgDomain(senderDomain);
    if (isInternal) {
      checks.push({ id: 'sender', status: 'pass' });
    } else {
      var senderSuspicious = senderDomain ? checkSuspiciousDomain('https://' + senderDomain, senderDomain) : null;
      if (senderSuspicious) {
        checks.push({ id: 'sender', status: 'fail' });
      } else if (isTrustedDomain(senderDomain)) {
        checks.push({ id: 'sender', status: 'pass' });
      } else {
        checks.push({ id: 'sender', status: 'warn' });
      }
    }

    // Sujet
    var subjectNorm = normalizeText(subject);
    var subjectHits = 0;
    for (var s = 0; s < PHISHING_KEYWORDS_SUBJECT.length; s++) {
      if (subjectNorm.indexOf(PHISHING_KEYWORDS_SUBJECT[s]) !== -1) subjectHits++;
    }
    checks.push({ id: 'subject', status: subjectHits > 0 ? 'warn' : 'pass' });

    // Corps
    var bodyText = normalizeText(extractTextFromHtml(html));
    var bodyHits = 0;
    for (var b = 0; b < PHISHING_KEYWORDS_BODY.length; b++) {
      if (bodyText.indexOf(PHISHING_KEYWORDS_BODY[b]) !== -1) bodyHits++;
    }
    checks.push({ id: 'body', status: bodyHits >= 2 ? 'fail' : bodyHits > 0 ? 'warn' : 'pass' });

    // Domaines de destination
    var linkDomains = [];
    for (var i = 0; i < links.length; i++) {
      if (links[i].hrefDomain && linkDomains.indexOf(links[i].hrefDomain) === -1) {
        linkDomains.push(links[i].hrefDomain);
      }
    }
    var suspectDestDomains = linkDomains.filter(function(d) {
      return !isTrustedDomain(d) && !isOrgDomain(d) && checkSuspiciousDomain('https://' + d, d);
    });
    var unknownDestDomains = linkDomains.filter(function(d) {
      return !isTrustedDomain(d) && !isOrgDomain(d) && !checkSuspiciousDomain('https://' + d, d);
    });

    if (suspectDestDomains.length > 0) {
      checks.push({ id: 'ext-domains', status: 'fail' });
    } else if (unknownDestDomains.length > 3) {
      checks.push({ id: 'ext-domains', status: 'warn' });
    } else {
      checks.push({ id: 'ext-domains', status: 'pass' });
    }

    return checks;
  }

  /* -- Score de confiance -------------------------------------------- */

  function computeScore(integrity, links) {
    var score = 100;

    for (var i = 0; i < integrity.length; i++) {
      var c = integrity[i];
      switch (c.id) {
        case 'sender':
          if (c.status === 'fail') score -= 25;
          else if (c.status === 'warn') score -= 5;
          break;
        case 'subject':
          if (c.status === 'warn') score -= 5;
          break;
        case 'body':
          if (c.status === 'fail') score -= 25;
          else if (c.status === 'warn') score -= 10;
          break;
        case 'ext-domains':
          if (c.status === 'fail') score -= 25;
          else if (c.status === 'warn') score -= 5;
          break;
      }
    }

    var mismatchPenalty = 0;
    var suspectPenalty = 0;
    for (var j = 0; j < links.length; j++) {
      if (links[j].isMismatch) mismatchPenalty += 20;
      else if (links[j].isSuspicious) suspectPenalty += 10;
    }
    score -= Math.min(40, mismatchPenalty);
    score -= Math.min(30, suspectPenalty);

    return Math.max(0, Math.min(100, score));
  }

  /* -- Handler evenementiel ------------------------------------------ */

  function onMessageRead(event) {
    var item = Office.context.mailbox.item;
    if (!item) {
      event.completed();
      return;
    }

    var senderEmail = '';
    var subject = '';
    try {
      if (item.from) senderEmail = (item.from.emailAddress || '').toLowerCase();
      subject = item.subject || '';
    } catch(e) {}

    item.body.getAsync(Office.CoercionType.Html, function(result) {
      if (result.status !== Office.AsyncResultStatus.Succeeded) {
        event.completed();
        return;
      }

      var html = result.value || '';
      var links = checkLinks(html);
      var integrity = checkIntegrity(senderEmail, subject, html, links);
      var score = computeScore(integrity, links);

      var mismatchCount = links.filter(function(l) { return l.mismatch; }).length;
      var totalLinks = links.length;

      var notif;

      if (score >= 80) {
        var msg80 = '\u2713 Link Checker : Confiance elevee (' + score + '/100) \u2014 ' + totalLinks + ' lien(s) OK';
        if (msg80.length > 150) msg80 = msg80.substring(0, 147) + '...';
        notif = {
          type: Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
          icon: 'Icon.16',
          message: msg80,
          persistent: false
        };
      } else if (score >= 50) {
        var msg50 = '\u26a0 Link Checker : Vigilance recommandee (' + score + '/100) \u2014 ' + mismatchCount + ' suspect(s)';
        if (msg50.length > 150) msg50 = msg50.substring(0, 147) + '...';
        notif = {
          type: Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
          icon: 'Icon.16',
          message: msg50,
          persistent: false
        };
      } else {
        var msgKo = 'Link Checker : RISQUE ELEVE (' + score + '/100) \u2014 Phishing potentiel detecte \u2014 ' + mismatchCount + ' lien(s) suspect(s)';
        if (msgKo.length > 150) msgKo = msgKo.substring(0, 147) + '...';
        notif = {
          type: Office.MailboxEnums.ItemNotificationMessageType.ErrorMessage,
          message: msgKo,
          persistent: true
        };
      }

      item.notificationMessages.replaceAsync('lc-score', notif, function() {
        event.completed();
      });
    });
  }

  /* -- Initialisation ------------------------------------------------ */

  Office.onReady(function() {
    Office.actions.associate('onMessageRead', onMessageRead);
  });
  </script>
</head>
<body></body>
</html>
