<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="core.js"></script>
  <script>
  'use strict';

  /* ===================================================================
     Link Checker — commands.js (event-based activation)
     Handler onMessageRead : analyse automatique + notificationMessage.

     NOTE : ce handler n'est execute QUE si le manifest declare un
     <ExtensionPoint xsi:type="LaunchEvent"> avec un <Runtime> pointant
     sur ce fichier (requires Mailbox 1.10+). Tant que ce bloc n'est pas
     ajoute dans manifest.xml, commands.html sert uniquement de
     FunctionFile inerte pour le bouton Ribbon en V1_0.
     =================================================================== */

  function onMessageRead(event) {
    var item = Office.context.mailbox.item;
    if (!item) { event.completed(); return; }

    var senderEmail = '';
    var subject = '';
    try {
      if (item.from) senderEmail = (item.from.emailAddress || '').toLowerCase();
      subject = item.subject || '';
    } catch (e) {}

    var bodyHtml = null;
    var mimeHeaders = null;
    var pending = 2;

    function onReady() {
      pending--;
      if (pending > 0) return;

      if (bodyHtml === null) { event.completed(); return; }

      var res = window.LC.analyze({
        from: senderEmail,
        subject: subject,
        bodyHtml: bodyHtml,
        mimeHeaders: mimeHeaders,
        item: item
      });

      var score = res.score;
      var mismatchCount = res.links.filter(function (l) { return l.mismatch; }).length;
      var totalLinks = res.links.length;

      var notif;
      if (score >= 80) {
        var m1 = '\u2713 Link Checker : Confiance elevee (' + score + '/100) \u2014 ' + totalLinks + ' lien(s) OK';
        if (m1.length > 150) m1 = m1.substring(0, 147) + '...';
        notif = {
          type: Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
          icon: 'Icon.16',
          message: m1,
          persistent: false
        };
      } else if (score >= 50) {
        var m2 = '\u26a0 Link Checker : Vigilance recommandee (' + score + '/100) \u2014 ' + mismatchCount + ' suspect(s)';
        if (m2.length > 150) m2 = m2.substring(0, 147) + '...';
        notif = {
          type: Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
          icon: 'Icon.16',
          message: m2,
          persistent: false
        };
      } else {
        var m3 = 'Link Checker : RISQUE ELEVE (' + score + '/100) \u2014 Phishing potentiel \u2014 ' + mismatchCount + ' lien(s) suspect(s)';
        if (m3.length > 150) m3 = m3.substring(0, 147) + '...';
        notif = {
          type: Office.MailboxEnums.ItemNotificationMessageType.ErrorMessage,
          message: m3,
          persistent: true
        };
      }

      try {
        item.notificationMessages.replaceAsync('lc-score', notif, function () { event.completed(); });
      } catch (e) { event.completed(); }
    }

    item.body.getAsync(Office.CoercionType.Html, function (r) {
      bodyHtml = (r.status === Office.AsyncResultStatus.Succeeded) ? (r.value || '') : null;
      onReady();
    });

    try {
      if (item.getAllInternetHeadersAsync) {
        item.getAllInternetHeadersAsync(function (r) {
          mimeHeaders = (r.status === Office.AsyncResultStatus.Succeeded) ? r.value : null;
          onReady();
        });
      } else {
        mimeHeaders = null;
        onReady();
      }
    } catch (e) { mimeHeaders = null; onReady(); }
  }

  Office.onReady(function () {
    if (Office.actions && Office.actions.associate) {
      Office.actions.associate('onMessageRead', onMessageRead);
    }
  });
  </script>
</head>
<body></body>
</html>
