<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Link Checker</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:#323130;background:#fff}

.hdr{padding:10px 14px;background:#f3f2f1;border-bottom:1px solid #edebe9;display:flex;align-items:center;gap:8px}
.hdr h1{font-size:14px;font-weight:600}

#banner{padding:10px 14px;border-left:4px solid #c8c6c4;background:#f3f2f1;color:#605e5c;display:flex;align-items:center;gap:8px;min-height:44px}
#banner.ok{border-color:#107c10;background:#dff6dd;color:#107c10}
#banner.good{border-color:#0078d4;background:#deecf9;color:#0078d4}
#banner.warn{border-color:#d83b01;background:#fff4ce;color:#8a6914}
#banner.ko{border-color:#a4262c;background:#fde7e9;color:#a4262c}
#banner.danger{border-color:#7f1d1d;background:#f5c6c6;color:#7f1d1d}
.b-icon{font-size:18px;flex-shrink:0}
.b-title{font-size:13px;font-weight:600}
.b-sub{font-size:11px;margin-top:2px;opacity:.85}

.spin{width:16px;height:16px;border:2px solid #edebe9;border-top-color:#0078d4;border-radius:50%;animation:r .7s linear infinite;flex-shrink:0}
@keyframes r{to{transform:rotate(360deg)}}

#btn{display:block;width:calc(100% - 28px);margin:8px 14px;padding:6px;background:#0078d4;color:#fff;border:none;border-radius:2px;cursor:pointer;font:500 13px 'Segoe UI',sans-serif}
#btn:hover{background:#106ebe}
#btn:disabled{background:#c8c6c4;cursor:default}
.score-bar{padding:8px 14px;display:none}
.score-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.score-label{font-size:11px;font-weight:600;color:#605e5c}
.score-value{font-size:13px;font-weight:700}
.score-track{height:6px;background:#edebe9;border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .4s ease}

.section-title{padding:10px 14px 4px;font-size:12px;font-weight:700;color:#0078d4;text-transform:uppercase;letter-spacing:0.5px;border-top:1px solid #edebe9;margin-top:6px}

.stats{display:flex;gap:12px;padding:6px 14px;font-size:11px;color :#605e5c}
.stats b{font-weight:600}

#integrity,#list{padding:0 14px 8px}

.check{padding:7px 10px;margin-bottom:4px;border-radius:2px;font-size:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.4}
.check-icon{flex-shrink:0;font-size:14px;margin-top:1px}
.check.pass{background:#f3f2f1;border-left:3px solid #107c10}
.check.fail{background:#fde7e9;border-left:3px solid #a4262c}
.check.warn{background:#fff4ce;border-left:3px solid #d83b01}
.check-label{font-weight:600;font-size:11px;color:#605e5c}
.check-detail{font-size:11px;color:#323130;margin-top:2px}

.link{padding:8px;margin-bottom:4px;border-radius:2px;background:#f3f2f1;border-left:3px solid #107c10;font-size:12px}
.link.mismatch{border-color:#a4262c;background:#fff3f4}
.link.suspect{border-color:#d83b01;background:#fff8f0}
.lbl{font-weight:500;margin-bottom:2px;word-break:break-all}
.url{color:#605e5c;font-size:11px;word-break:break-all}
.real{color:#a4262c;font-size:11px;margin-top:4px;line-height:1.4}
.warn-line{color:#d83b01;font-size:11px;margin-top:3px;line-height:1.4}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;margin-top:4px}
.tag.ok{background:#dff6dd;color:#107c10}
.tag.ko{background:#fde7e9;color:#a4262c}
.tag.warn{background:#fff4ce;color:#8a6914}

.empty{padding:10px 14px;color:#605e5c;font-size:12px;font-style:italic}
.foot{padding:8px 14px;font-size:10px;color:#a19f9d;text-align:center}
</style>
</head>
<body>

<div class="hdr">
  <span style="font-size:16px">&#128279;</span>
  <h1>Link Checker</h1>
</div>

<div id="banner">
  <div class="spin"></div>
  <div><div class="b-title">Initialisation...</div></div>
</div>

<div class="score-bar" id="score-bar">
  <div class="score-header">
    <span class="score-label">Score de confiance</span>
    <span class="score-value" id="score-val">--</span>
  </div>
  <div class="score-track">
    <div class="score-fill" id="score-fill"></div>
  </div>
</div>

<button id="btn" disabled>&#8635; Re-analyser</button>

<div class="section-title">Integrite du mail</div>
<div id="integrity"></div>

<div class="section-title">Headers anti-spam</div>
<div id="headers"></div>

<div class="section-title">Pieces jointes</div>
<div id="attachments"></div>

<div class="section-title">Analyse des liens</div>
<div class="stats">
  <span>Liens : <b id="c-total">-</b></span>
  <span>OK : <b id="c-ok">-</b></span>
  <span>Suspects : <b id="c-ko" style="color:#a4262c">-</b></span>
</div>
<div id="list"></div>

<div class="foot">Analyse 100% locale &middot; aucune donnee transmise &middot; EMPIRYS &middot; v1.0.1.0</div>

<script>
'use strict';

/* ===================================================================
   Link Checker v4 — Office.js Add-in
   1. Integrite du mail (expediteur, sujet, corps, domaines)
   2. Headers anti-spam (SCL, BCL, EOP, SPF/DKIM/DMARC)
   3. Analyse des liens (mismatch, heuristique domaine)
   4. Score de confiance pondere sur 100
   =================================================================== */

var currentItemId = null;

Office.onReady(function(info) {
  if (info.host !== Office.HostType.Outlook) return;
  document.getElementById('btn').addEventListener('click', run);

  if (Office.context.mailbox.item) {
    currentItemId = Office.context.mailbox.item.itemId;
    run();
  }

  if (Office.context.mailbox.addHandlerAsync) {
    Office.context.mailbox.addHandlerAsync(
      Office.EventType.ItemChanged,
      function() {
        var newId = Office.context.mailbox.item ? Office.context.mailbox.item.itemId : null;
        if (newId && newId !== currentItemId) {
          currentItemId = newId;
          run();
        }
      }
    );
  }
});

/* -- Domaines et constantes ---------------------------------------- */

var ORG_DOMAINS = ['empirys.com', 'empirys.lu', 'empirys.eu', 'empirys.fr'];

var TRUSTED_DOMAINS = [
  'empirys.com', 'empirys.lu', 'empirys.eu', 'empirys.fr',
  'microsoft.com', 'office.com', 'outlook.com', 'live.com', 'office365.com',
  'google.com', 'gmail.com', 'linkedin.com', 'github.com',
  'apple.com', 'icloud.com', 'twitter.com', 'x.com',
  'facebook.com', 'instagram.com', 'youtube.com',
  'amazonaws.com', 'azure.com', 'cloudflare.com',
  'made-in-luxembourg.com', 'made-in-luxembourg.lu',
  'odoo.com', 'docusign.com', 'dropbox.com', 'adobe.com',
  'restez-mieux.fr', 'aka.ms',
  'netflix.com', 'spotify.com', 'paypal.com',
  'shopify.com', 'zoom.us', 'slack.com', 'teams.microsoft.com',
  'airtable.com', 'notion.so', 'asana.com', 'trello.com',
  'canva.com', 'figma.com', 'github.io', 'gitlab.com',
  'jira.com','monday.com'
];

var SUSPICIOUS_KEYWORDS = [
  'bank', 'banque', 'paypal', 'secure', 'security', 'login',
  'signin', 'account', 'verify', 'update', 'confirm', 'alert',
  'suspend', 'locked', 'urgent', 'password', 'credential',
  'wallet', 'crypto', 'invoice', 'payment', 'billing',
  'support-', '-support', 'helpdesk', 'service-client'
];

var BRAND_NAMES = [
  'microsoft', 'google', 'apple', 'amazon', 'paypal', 'netflix',
  'facebook', 'instagram', 'whatsapp', 'linkedin', 'twitter',
  'dropbox', 'adobe', 'oracle', 'salesforce', 'docusign',
  'stripe', 'shopify', 'zoom', 'slack', 'outlook', 'office365',
  'onedrive', 'sharepoint', 'teams'
];

/* Keywords sujet — haute confiance : toujours significatifs */
var SUBJECT_HIGH = [
  'urgent', 'immediate', 'action requise', 'action required',
  'suspend', 'bloqu', 'locked', 'desactiv', 'disabled',
  'mot de passe', 'password', 'expir',
  'derniere chance', 'last chance',
  'acces non autorise', 'unauthorized access',
  'gagn', 'felicitation', 'congratulation'
];

/* Keywords sujet — basse confiance : frequents dans les mails legitimes,
   ne comptent que si un autre signal est deja present */
var SUBJECT_LOW = [
  'verif', 'confirm', 'securite', 'security', 'alerte', 'alert',
  'facture', 'invoice', 'paiement', 'payment',
  'compte', 'account', 'mise a jour', 'update',
  'remboursement', 'refund', 'renouvel', 'limite', 'limited'
];

/* Keywords corps — haute confiance : formulations typiques de phishing */
var BODY_HIGH = [
  'cliquez ici immediatement', 'click here immediately',
  'votre compte sera', 'your account will be',
  'verifiez votre identite', 'verify your identity',
  'confirmer vos informations', 'confirm your information',
  'mot de passe expire', 'password expired',
  'acces non autorise', 'unauthorized access',
  'activite suspecte', 'suspicious activity',
  'ouvrir la piece jointe', 'open the attachment',
  'repondez immediatement', 'respond immediately',
  'action immediate requise', 'immediate action required',
  'sous peine de', 'failure to comply'
];

/* Keywords corps — basse confiance : courants dans les mails transactionnels */
var BODY_LOW = [
  'dans les 24', 'within 24', 'dans les 48', 'within 48',
  'cliquez sur le lien', 'click the link',
  'telecharger le document', 'download the document',
  'mettre a jour vos informations', 'update your information',
  'connectez-vous', 'log in to your account'
];

/* -- Extensions et noms de fichiers suspects ----------------------- */

var DANGEROUS_EXTENSIONS = [
  'exe', 'scr', 'bat', 'cmd', 'com', 'pif', 'vbs', 'vbe',
  'js', 'jse', 'wsf', 'wsh', 'ps1', 'psm1',
  'msi', 'msp', 'hta', 'cpl', 'inf', 'reg',
  'iso', 'img', 'vhd', 'vhdx',
  'lnk', 'url', 'iqy', 'slk',
  'dll', 'ocx', 'sys', 'drv'
];

var MACRO_EXTENSIONS = [
  'docm', 'xlsm', 'pptm', 'dotm', 'xltm', 'potm',
  'xlam', 'ppam', 'sldm'
];

var ARCHIVE_EXTENSIONS = [
  'zip', 'rar', '7z', 'tar', 'gz', 'cab', 'arj', 'ace'
];

var GENERIC_ATTACHMENT_NAMES = [
  'document', 'fichier', 'file', 'invoice', 'facture',
  'scan', 'copie', 'copy', 'payment', 'paiement',
  'order', 'commande', 'receipt', 'recu', 'img', 'photo',
  'dhl', 'fedex', 'ups', 'delivery', 'livraison'
];

/* -- Analyse principale -------------------------------------------- */

function run() {
  var btn = document.getElementById('btn');
  btn.disabled = true;
  setBanner('load', null, 'Analyse en cours...', null);
  document.getElementById('list').innerHTML = '';
  document.getElementById('integrity').innerHTML = '';
  document.getElementById('headers').innerHTML = '';
  document.getElementById('attachments').innerHTML = '';
  document.getElementById('score-bar').style.display = 'none';

  var item = Office.context.mailbox.item;
  var senderEmail = '';
  var subject = '';

  try {
    if (item.from) {
      senderEmail = (item.from.emailAddress || '').toLowerCase();
    }
    subject = item.subject || '';
  } catch(e) {}

  // Recuperation parallele du body HTML et des headers MIME
  var bodyHtml = null;
  var mimeHeaders = null;
  var pending = 2;

  function onPartReady() {
    pending--;
    if (pending > 0) return;
    btn.disabled = false;
    if (!bodyHtml && bodyHtml !== '') {
      setBanner('ko', null, 'Impossible de lire le contenu', null);
      return;
    }
    var links = checkLinks(bodyHtml);
    var headerAnalysis = analyzeHeaders(mimeHeaders);
    var attachmentAnalysis = analyzeAttachments(item);
    var hasSuspectLinks = links.some(function(l) { return l.mismatch; });
    var integrity = checkIntegrity(senderEmail, subject, bodyHtml, links, hasSuspectLinks, headerAnalysis);
    renderIntegrity(integrity);
    renderHeaders(headerAnalysis);
    renderAttachments(attachmentAnalysis);
    renderLinks(links);
    // Scoring combine integrite + headers + pièces jointes
    var allChecks = integrity.concat(headerAnalysis).concat(attachmentAnalysis);
    renderScore(allChecks, links);
  }

  item.body.getAsync(Office.CoercionType.Html, function(result) {
    bodyHtml = (result.status === Office.AsyncResultStatus.Succeeded) ? (result.value || '') : null;
    onPartReady();
  });

  // Lecture des headers MIME via getAllInternetHeadersAsync (Mailbox 1.8+)
  if (item.getAllInternetHeadersAsync) {
    item.getAllInternetHeadersAsync(function(result) {
      mimeHeaders = (result.status === Office.AsyncResultStatus.Succeeded) ? result.value : null;
      onPartReady();
    });
  } else {
    mimeHeaders = null;
    onPartReady();
  }
}

/* -- Check integrite du mail --------------------------------------- */

function checkIntegrity(senderEmail, subject, html, links, hasSuspectLinks, headerAnalysis) {
  var checks = [];
  var senderDomain = getDomainFromEmail(senderEmail);

  // 1. Expediteur
  var isInternal = isOrgDomain(senderDomain);
  if (isInternal) {
    checks.push({
      id: 'sender', label: 'Expediteur', status: 'pass',
      detail: 'Domaine interne (' + senderDomain + ')'
    });
  } else {
    var senderSuspicious = senderDomain ? checkSuspiciousDomain('https://' + senderDomain, senderDomain) : null;
    if (senderSuspicious) {
      checks.push({
        id: 'sender', label: 'Expediteur', status: 'fail',
        detail: 'Expediteur externe suspect : ' + (senderEmail || 'inconnu') + ' — ' + senderSuspicious.join(', ')
      });
    } else if (isTrustedDomain(senderDomain)) {
      checks.push({
        id: 'sender', label: 'Expediteur', status: 'pass',
        detail: 'Expediteur externe de confiance (' + senderDomain + ')'
      });
    } else {
      checks.push({
        id: 'sender', label: 'Expediteur', status: 'warn',
        detail: 'Expediteur externe : ' + (senderEmail || 'inconnu')
      });
    }
  }

  // 2. Mots-cles phishing dans le sujet (haute + basse confiance)
  var subjectNorm = normalizeText(subject);
  var subjectHighHits = matchKeywords(subjectNorm, SUBJECT_HIGH);
  var subjectLowHits = matchKeywords(subjectNorm, SUBJECT_LOW);
  // Un autre signal = expediteur non-pass, liens suspects, ou headers en echec
  var hasOtherSignal = (checks.length > 0 && checks[0].status !== 'pass')
    || hasSuspectLinks
    || headerAnalysis.some(function(h) { return h.status === 'fail' || h.status === 'warn'; });

  if (subjectHighHits.length > 0) {
    checks.push({
      id: 'subject', label: 'Sujet du mail', status: 'warn',
      detail: 'Mot(s)-cle(s) suspect(s) : ' + subjectHighHits.join(', ')
    });
  } else if (subjectLowHits.length > 0 && hasOtherSignal) {
    checks.push({
      id: 'subject', label: 'Sujet du mail', status: 'warn',
      detail: 'Mot(s)-cle(s) contextuellement suspect(s) : ' + subjectLowHits.join(', ')
    });
  } else if (subjectLowHits.length > 0) {
    checks.push({
      id: 'subject', label: 'Sujet du mail', status: 'pass',
      detail: 'Mots-cles courants detectes (' + subjectLowHits.join(', ') + ') mais aucun autre signal'
    });
  } else {
    checks.push({
      id: 'subject', label: 'Sujet du mail', status: 'pass',
      detail: 'Aucun mot-cle de phishing detecte dans le sujet'
    });
  }

  // 3. Formulations phishing dans le corps (haute + basse confiance)
  var bodyText = normalizeText(extractTextFromHtml(html));
  var bodyHighHits = matchKeywords(bodyText, BODY_HIGH);
  var bodyLowHits = matchKeywords(bodyText, BODY_LOW);

  if (bodyHighHits.length >= 2) {
    checks.push({
      id: 'body', label: 'Contenu du mail', status: 'fail',
      detail: 'Formulations de phishing : ' + bodyHighHits.join(' | ')
    });
  } else if (bodyHighHits.length === 1) {
    checks.push({
      id: 'body', label: 'Contenu du mail', status: 'warn',
      detail: 'Formulation suspecte : ' + bodyHighHits[0]
    });
  } else if (bodyLowHits.length > 0 && (hasOtherSignal || subjectHighHits.length > 0)) {
    checks.push({
      id: 'body', label: 'Contenu du mail', status: 'warn',
      detail: 'Formulations contextuellement suspectes : ' + bodyLowHits.join(' | ')
    });
  } else if (bodyLowHits.length > 0) {
    checks.push({
      id: 'body', label: 'Contenu du mail', status: 'pass',
      detail: 'Formulations courantes detectees mais aucun autre signal'
    });
  } else {
    checks.push({
      id: 'body', label: 'Contenu du mail', status: 'pass',
      detail: 'Aucune formulation de phishing detectee'
    });
  }

  // 4. Domaines de destination
  var linkDomains = [];
  for (var i = 0; i < links.length; i++) {
    if (links[i].hrefDomain && linkDomains.indexOf(links[i].hrefDomain) === -1) {
      linkDomains.push(links[i].hrefDomain);
    }
  }
  var suspectDestDomains = linkDomains.filter(function(d) {
    return !isTrustedDomain(d) && !isOrgDomain(d) && checkSuspiciousDomain('https://' + d, d);
  });
  var unknownDestDomains = linkDomains.filter(function(d) {
    return !isTrustedDomain(d) && !isOrgDomain(d) && !checkSuspiciousDomain('https://' + d, d);
  });

  if (suspectDestDomains.length > 0) {
    checks.push({
      id: 'ext-domains', label: 'Domaines de destination', status: 'fail',
      detail: suspectDestDomains.length + ' domaine(s) suspect(s) : ' + suspectDestDomains.join(', ')
    });
  } else if (unknownDestDomains.length > 3) {
    checks.push({
      id: 'ext-domains', label: 'Domaines de destination', status: 'warn',
      detail: unknownDestDomains.length + ' domaines externes non-repertories : ' + unknownDestDomains.join(', ')
    });
  } else {
    checks.push({
      id: 'ext-domains', label: 'Domaines de destination', status: 'pass',
      detail: 'Aucun domaine suspect detecte dans les liens'
    });
  }

  return checks;
}

/* -- Analyse des headers MIME (SCL, BCL, SPF, DKIM, DMARC) -------- */

function analyzeHeaders(raw) {
  var checks = [];
  if (!raw) {
    checks.push({
      id: 'headers', label: 'Headers anti-spam', status: 'warn',
      detail: 'Headers MIME indisponibles (client non supporte ou mail local)'
    });
    return checks;
  }

  // --- SCL (Spam Confidence Level) ---
  var sclMatch = raw.match(/X-MS-Exchange-Organization-SCL:\s*(-?\d+)/i);
  // Fallback : chercher SCL dans X-Forefront-Antispam-Report
  if (!sclMatch) {
    var faMatch = raw.match(/X-Forefront-Antispam-Report:.*?SCL:(-?\d+)/i);
    if (faMatch) sclMatch = faMatch;
  }
  if (sclMatch) {
    var scl = parseInt(sclMatch[1], 10);
    if (scl <= 0) {
      checks.push({ id: 'scl', label: 'SCL (Spam Confidence)', status: 'pass',
        detail: 'SCL = ' + scl + ' — Message de confiance (bypass anti-spam ou interne)' });
    } else if (scl <= 3) {
      checks.push({ id: 'scl', label: 'SCL (Spam Confidence)', status: 'pass',
        detail: 'SCL = ' + scl + ' — Niveau de spam faible' });
    } else if (scl <= 5) {
      checks.push({ id: 'scl', label: 'SCL (Spam Confidence)', status: 'warn',
        detail: 'SCL = ' + scl + ' — Niveau de spam modere, prudence' });
    } else {
      checks.push({ id: 'scl', label: 'SCL (Spam Confidence)', status: 'fail',
        detail: 'SCL = ' + scl + ' — Niveau de spam eleve, message tres suspect' });
    }
  }

  // --- BCL (Bulk Complaint Level) ---
  var bclMatch = raw.match(/BCL:(\d+)/i);
  if (bclMatch) {
    var bcl = parseInt(bclMatch[1], 10);
    if (bcl <= 3) {
      checks.push({ id: 'bcl', label: 'BCL (Bulk / Masse)', status: 'pass',
        detail: 'BCL = ' + bcl + ' — Expediteur avec peu de plaintes' });
    } else if (bcl <= 6) {
      checks.push({ id: 'bcl', label: 'BCL (Bulk / Masse)', status: 'warn',
        detail: 'BCL = ' + bcl + ' — Expediteur d\'envois en masse (taux de plaintes modere)' });
    } else {
      checks.push({ id: 'bcl', label: 'BCL (Bulk / Masse)', status: 'fail',
        detail: 'BCL = ' + bcl + ' — Fort taux de plaintes, probable spam ou campagne de masse' });
    }
  }

  // --- Categorie EOP (CAT dans X-Forefront-Antispam-Report) ---
  var catMatch = raw.match(/X-Forefront-Antispam-Report:.*?CAT:([A-Z]+)/i);
  if (catMatch) {
    var cat = catMatch[1].toUpperCase();
    var catLabels = {
      'NONE': { status: 'pass', text: 'Aucune menace detectee par EOP' },
      'SPM': { status: 'warn', text: 'Classe comme spam par EOP' },
      'HSPM': { status: 'fail', text: 'Classe comme spam haute confiance par EOP' },
      'PHSH': { status: 'fail', text: 'Classe comme PHISHING par EOP' },
      'HPHSH': { status: 'fail', text: 'Classe comme phishing haute confiance par EOP' },
      'MALW': { status: 'fail', text: 'MALWARE detecte par EOP' },
      'BULK': { status: 'warn', text: 'Classe comme envoi de masse (bulk) par EOP' },
      'GIMP': { status: 'pass', text: 'Source autorisee (Mailbox Intelligence)' },
      'SAP': { status: 'pass', text: 'Politique anti-spam approuvee' },
      'OSPM': { status: 'warn', text: 'Spam sortant detecte' }
    };
    var catInfo = catLabels[cat] || { status: 'warn', text: 'Categorie EOP : ' + cat };
    checks.push({ id: 'eop-cat', label: 'Categorie EOP', status: catInfo.status,
      detail: catInfo.text });
  }

  // --- Authentification (SPF, DKIM, DMARC) ---
  var authResults = raw.match(/Authentication-Results:.*?(?=\r?\n[^\s])/si);
  if (!authResults) {
    // Fallback : recherche multi-ligne plus large
    authResults = raw.match(/Authentication-Results:[^\r\n]*/i);
  }
  if (authResults) {
    var authStr = authResults[0];
    var spfResult = extractAuthResult(authStr, 'spf');
    var dkimResult = extractAuthResult(authStr, 'dkim');
    var dmarcResult = extractAuthResult(authStr, 'dmarc');

    var authChecks = [];
    var authFails = 0;
    var authPasses = 0;

    if (spfResult) {
      authChecks.push('SPF=' + spfResult);
      if (spfResult === 'pass') authPasses++; else if (spfResult === 'fail' || spfResult === 'softfail') authFails++;
    }
    if (dkimResult) {
      authChecks.push('DKIM=' + dkimResult);
      if (dkimResult === 'pass') authPasses++; else if (dkimResult === 'fail') authFails++;
    }
    if (dmarcResult) {
      authChecks.push('DMARC=' + dmarcResult);
      if (dmarcResult === 'pass') authPasses++; else if (dmarcResult === 'fail') authFails++;
    }

    if (authChecks.length > 0) {
      var authStatus = 'pass';
      var authMsg = authChecks.join(', ');
      if (authFails >= 2) {
        authStatus = 'fail';
        authMsg += ' — Authentification defaillante, usurpation probable';
      } else if (authFails >= 1) {
        authStatus = 'warn';
        authMsg += ' — Echec partiel d\'authentification';
      } else if (authPasses >= 2) {
        authMsg += ' — Authentification valide';
      }
      checks.push({ id: 'auth', label: 'Authentification (SPF/DKIM/DMARC)', status: authStatus,
        detail: authMsg });
    }
  }

  // --- Reply-To != From (usurpation classique) ---
  var replyToMatch = raw.match(/Reply-To:\s*<?([^\s<>,;]+@[^\s<>,;]+)>?/i);
  if (replyToMatch) {
    var replyToEmail = replyToMatch[1].toLowerCase();
    var fromMatch = raw.match(/^From:\s*(?:.*<)?([^\s<>,;]+@[^\s<>,;]+)>?/im);
    var fromEmail = fromMatch ? fromMatch[1].toLowerCase() : '';

    if (fromEmail && replyToEmail !== fromEmail) {
      var replyToDomain = getDomainFromEmail(replyToEmail);
      var fromDomain = getDomainFromEmail(fromEmail);
      if (replyToDomain !== fromDomain) {
        checks.push({
          id: 'reply-to', label: 'Reply-To divergent', status: 'fail',
          detail: 'From: ' + fromEmail + ' mais Reply-To: ' + replyToEmail + ' — domaines differents, usurpation probable'
        });
      } else {
        checks.push({
          id: 'reply-to', label: 'Reply-To divergent', status: 'warn',
          detail: 'From: ' + fromEmail + ' mais Reply-To: ' + replyToEmail + ' (meme domaine)'
        });
      }
    }
  }

  // Si aucun header pertinent n'a ete trouve (mail sans headers EOP)
  if (checks.length === 0) {
    checks.push({
      id: 'headers', label: 'Headers anti-spam', status: 'warn',
      detail: 'Aucun header anti-spam EOP detecte (mail interne ou non-M365)'
    });
  }

  return checks;
}

function extractAuthResult(authStr, method) {
  var re = new RegExp(method + '=([a-z]+)', 'i');
  var m = authStr.match(re);
  return m ? m[1].toLowerCase() : null;
}

/* -- Analyse des pieces jointes ------------------------------------ */

function analyzeAttachments(item) {
  var checks = [];
  var attachments = (item && item.attachments) ? item.attachments : [];

  if (attachments.length === 0) {
    checks.push({
      id: 'attach', label: 'Pieces jointes', status: 'pass',
      detail: 'Aucune piece jointe'
    });
    return checks;
  }

  var dangerousFound = [];
  var macroFound = [];
  var archiveFound = [];
  var doubleExtFound = [];
  var genericNameFound = [];

  for (var i = 0; i < attachments.length; i++) {
    var att = attachments[i];
    var name = (att.name || '').toLowerCase();
    var nameParts = name.split('.');

    // Double extension (ex: invoice.pdf.exe)
    if (nameParts.length >= 3) {
      var lastExt = nameParts[nameParts.length - 1];
      if (DANGEROUS_EXTENSIONS.indexOf(lastExt) !== -1) {
        doubleExtFound.push(att.name);
        continue;
      }
    }

    // Extension finale
    var ext = nameParts.length >= 2 ? nameParts[nameParts.length - 1] : '';

    if (DANGEROUS_EXTENSIONS.indexOf(ext) !== -1) {
      dangerousFound.push(att.name);
    } else if (MACRO_EXTENSIONS.indexOf(ext) !== -1) {
      macroFound.push(att.name);
    } else if (ARCHIVE_EXTENSIONS.indexOf(ext) !== -1) {
      archiveFound.push(att.name);
    }

    // Nom generique suspect
    var baseName = nameParts.slice(0, -1).join('.').replace(/[\d_\-\s]/g, '');
    for (var g = 0; g < GENERIC_ATTACHMENT_NAMES.length; g++) {
      if (baseName === GENERIC_ATTACHMENT_NAMES[g]) {
        genericNameFound.push(att.name);
        break;
      }
    }
  }

  // Double extension = critique
  if (doubleExtFound.length > 0) {
    checks.push({
      id: 'attach-double', label: 'Double extension detectee', status: 'fail',
      detail: 'Fichier(s) avec double extension (technique d\'usurpation) : ' + doubleExtFound.join(', ')
    });
  }

  // Extensions dangereuses
  if (dangerousFound.length > 0) {
    checks.push({
      id: 'attach-danger', label: 'Extension dangereuse', status: 'fail',
      detail: 'Fichier(s) executable(s) ou script(s) : ' + dangerousFound.join(', ')
    });
  }

  // Macros
  if (macroFound.length > 0) {
    checks.push({
      id: 'attach-macro', label: 'Fichier avec macros', status: 'warn',
      detail: 'Document(s) Office avec macros activees : ' + macroFound.join(', ')
    });
  }

  // Archives
  if (archiveFound.length > 0) {
    checks.push({
      id: 'attach-archive', label: 'Archive compresse', status: 'warn',
      detail: 'Archive(s) pouvant masquer du contenu malveillant : ' + archiveFound.join(', ')
    });
  }

  // Noms generiques
  if (genericNameFound.length > 0) {
    checks.push({
      id: 'attach-generic', label: 'Nom generique', status: 'warn',
      detail: 'Nom(s) de fichier generique(s) souvent utilise(s) en phishing : ' + genericNameFound.join(', ')
    });
  }

  // Tout OK
  if (checks.length === 0) {
    checks.push({
      id: 'attach', label: 'Pieces jointes', status: 'pass',
      detail: attachments.length + ' piece(s) jointe(s), aucune anomalie detectee'
    });
  }

  return checks;
}

function renderAttachments(checks) {
  var h = '';
  var icons = { pass: '&#10003;', warn: '&#9888;', fail: '&#10007;' };
  for (var i = 0; i < checks.length; i++) {
    var c = checks[i];
    h += '<div class="check ' + c.status + '">';
    h += '<span class="check-icon">' + icons[c.status] + '</span>';
    h += '<div>';
    h += '<div class="check-label">' + esc(c.label) + '</div>';
    h += '<div class="check-detail">' + esc(c.detail) + '</div>';
    h += '</div></div>';
  }
  document.getElementById('attachments').innerHTML = h;
}

/* -- Extraction + comparaison des liens ---------------------------- */

function unwrapSafeLinks(href) {
  try {
    var u = new URL(href);
    if (u.hostname.indexOf('safelinks.protection.outlook.com') !== -1) {
      var real = u.searchParams.get('url');
      if (real) return real;
    }
  } catch(e) {}
  return href;
}

function checkLinks(html) {
  var doc = new DOMParser().parseFromString(html, 'text/html');
  var anchors = doc.querySelectorAll('a[href]');
  var results = [];

  for (var i = 0; i < anchors.length; i++) {
    var rawHref = (anchors[i].getAttribute('href') || '').trim();
    var text = (anchors[i].textContent || '').replace(/\s+/g, ' ').trim();

    if (!rawHref || /^(mailto:|tel:|#|javascript:)/i.test(rawHref)) continue;

    var href = unwrapSafeLinks(rawHref);
    var isSafeLinks = (href !== rawHref);
    var hrefDomain = getDomain(href);
    if (!hrefDomain) continue;

    var mismatch = false;
    var suspicious = false;
    var reason = '';
    var warnings = [];

    // Check 1 : texte URL-like vs href domain mismatch
    if (looksLikeUrl(text)) {
      var textDomain = getDomain(text);
      if (textDomain && textDomain !== hrefDomain) {
        mismatch = true;
        reason = 'Le texte affiche "' + textDomain + '" mais le lien pointe vers "' + hrefDomain + '"';
      }
    }

    // Check 2 : analyse heuristique du domaine
    var suspiciousReasons = checkSuspiciousDomain(href, hrefDomain);
    if (suspiciousReasons && !isTrustedDomain(hrefDomain)) {
      suspicious = true;
      warnings = suspiciousReasons;
      if (!mismatch) reason = warnings.join(' | ');
    }

    var flagged = mismatch || suspicious;

    results.push({
      text: text || '(vide)',
      href: href,
      rawHref: rawHref,
      hrefDomain: hrefDomain,
      mismatch: flagged,
      isMismatch: mismatch,
      isSuspicious: suspicious,
      reason: reason,
      warnings: warnings,
      safelinks: isSafeLinks
    });
  }
  return results;
}

/* -- Analyse heuristique domaine ----------------------------------- */

function isTrustedDomain(domain) {
  if (!domain) return false;
  for (var i = 0; i < TRUSTED_DOMAINS.length; i++) {
    if (domain === TRUSTED_DOMAINS[i]) return true;
    if (domain.length > TRUSTED_DOMAINS[i].length &&
        domain.indexOf('.' + TRUSTED_DOMAINS[i]) === domain.length - TRUSTED_DOMAINS[i].length - 1) return true;
  }
  return false;
}

function isOrgDomain(domain) {
  for (var i = 0; i < ORG_DOMAINS.length; i++) {
    if (domain === ORG_DOMAINS[i]) return true;
  }
  return false;
}

function checkSuspiciousDomain(href, domain) {
  if (!domain || isTrustedDomain(domain)) return null;
  var domainLower = domain.toLowerCase();
  var reasons = [];

  for (var i = 0; i < SUSPICIOUS_KEYWORDS.length; i++) {
    if (domainLower.indexOf(SUSPICIOUS_KEYWORDS[i]) !== -1) {
      reasons.push('Mot-cle sensible "' + SUSPICIOUS_KEYWORDS[i] + '" dans le domaine');
      break;
    }
  }

  var domainBase = domainLower.split('.')[0];
  for (var j = 0; j < BRAND_NAMES.length; j++) {
    var brand = BRAND_NAMES[j];
    if (domainBase.indexOf(brand) !== -1 && domainBase !== brand) {
      reasons.push('Possible usurpation de marque "' + brand + '"');
      break;
    }
  }

  if (reasons.length > 0) {
    try {
      var u = new URL(href.indexOf('://') === -1 ? 'https://' + href : href);
      var path = u.pathname + u.search;
      if (/[a-f0-9\-]{32,}/i.test(path)) {
        reasons.push('URL contient des identifiants de tracking suspects');
      }
    } catch(e) {}
  }

  return reasons.length > 0 ? reasons : null;
}

/* -- Helpers ------------------------------------------------------- */

function matchKeywords(text, keywords) {
  var hits = [];
  for (var i = 0; i < keywords.length; i++) {
    if (text.indexOf(keywords[i]) !== -1) hits.push(keywords[i]);
  }
  return hits;
}

function getDomain(raw) {
  try {
    var s = raw.trim();
    if (!/^https?:\/\//i.test(s)) s = 'https://' + s;
    var h = new URL(s).hostname.toLowerCase().replace(/^www\./, '');
    var p = h.split('.');
    return p.length < 2 ? h : p.slice(-2).join('.');
  } catch(e) { return ''; }
}

function getDomainFromEmail(email) {
  if (!email) return '';
  var parts = email.split('@');
  if (parts.length < 2) return '';
  var h = parts[1].toLowerCase();
  var p = h.split('.');
  return p.length < 2 ? h : p.slice(-2).join('.');
}

function looksLikeUrl(t) {
  t = t.trim();
  return /^https?:\/\//i.test(t) || /^[a-z0-9][a-z0-9\-]*\.[a-z]{2,}/i.test(t);
}

function normalizeText(t) {
  return (t || '').toLowerCase()
    .replace(/[eéèêë]/g, 'e')
    .replace(/[aàâä]/g, 'a')
    .replace(/[iîï]/g, 'i')
    .replace(/[oôö]/g, 'o')
    .replace(/[uùûü]/g, 'u')
    .replace(/[cç]/g, 'c')
    .replace(/\s+/g, ' ');
}

function extractTextFromHtml(html) {
  try {
    var doc = new DOMParser().parseFromString(html, 'text/html');
    return doc.body ? doc.body.textContent : '';
  } catch(e) { return ''; }
}

/* -- Rendu : Liens ------------------------------------------------- */

function renderLinks(links) {
  var mm = links.filter(function(l){ return l.mismatch; });
  var total = links.length, okN = total - mm.length, koN = mm.length;

  document.getElementById('c-total').textContent = total;
  document.getElementById('c-ok').textContent = okN;
  document.getElementById('c-ko').textContent = koN;

  if (total === 0) {
    document.getElementById('list').innerHTML = '<div class="empty">Pas de lien a analyser.</div>';
    return;
  }

  var sorted = mm.concat(links.filter(function(l){ return !l.mismatch; }));
  var h = '';
  for (var i = 0; i < sorted.length; i++) {
    var l = sorted[i];
    var cls = l.mismatch ? (l.isMismatch ? ' mismatch' : ' suspect') : '';
    h += '<div class="link' + cls + '">';
    h += '<div class="lbl">' + esc(trunc(l.text, 80)) + '</div>';
    h += '<div class="url">&rarr; ' + esc(trunc(l.href, 120)) + '</div>';
    if (l.safelinks) {
      h += '<div class="url" style="color:#0078d4;font-style:italic">&#128737; URL deballee depuis SafeLinks</div>';
    }
    if (l.isMismatch) {
      h += '<div class="real">&#9888; ' + esc(l.reason) + '</div>';
      h += '<span class="tag ko">MISMATCH</span>';
    } else if (l.isSuspicious) {
      for (var w = 0; w < l.warnings.length; w++) {
        h += '<div class="warn-line">&#9888; ' + esc(l.warnings[w]) + '</div>';
      }
      h += '<span class="tag warn">SUSPECT</span>';
    } else {
      h += '<span class="tag ok">OK</span>';
    }
    h += '</div>';
  }
  document.getElementById('list').innerHTML = h;
}

/* -- Scoring et banniere ------------------------------------------- */

/*  Score de confiance sur 100 (deductions depuis 100)
    -------------------------------------------------------
    Expediteur externe non-trusted :          -25
    Expediteur externe suspect :             -25
    SCL 4-5 (warn) :                         -10
    SCL 6+ (fail) :                          -25
    BCL 4-6 (warn) :                          -5
    BCL 7+ (fail) :                          -15
    EOP categorie PHSH/MALW/HSPM (fail) :   -30
    EOP categorie SPM/BULK (warn) :          -10
    Auth (SPF/DKIM/DMARC) fail partiel :    -10
    Auth fail multiple :                     -20
    Reply-To != From meme domaine (warn) :   -5
    Reply-To != From domaines diff (fail) : -20
    PJ double extension (fail) :            -30
    PJ extension dangereuse (fail) :        -25
    PJ macros (warn) :                      -10
    PJ archive (warn) :                      -5
    PJ nom generique (warn) :                -5
    Mot-cle phishing sujet (warn) :          -5
    Formulation phishing corps (warn) :     -10
    Formulation phishing corps (fail) :     -25
    Domaine destination suspect (fail) :    -25
    Domaines inconnus > 3 (warn) :           -5
    Lien mismatch texte/href :              -20 par lien (max -40)
    Lien suspect heuristique :              -10 par lien (max -30)
    -------------------------------------------------------  */

function computeScore(integrity, links) {
  var score = 100;

  for (var i = 0; i < integrity.length; i++) {
    var c = integrity[i];
    switch (c.id) {
      case 'sender':
        if (c.status === 'fail') score -= 25;
        else if (c.status === 'warn') score -= 25;
        break;
      case 'scl':
        if (c.status === 'fail') score -= 25;
        else if (c.status === 'warn') score -= 10;
        break;
      case 'bcl':
        if (c.status === 'fail') score -= 15;
        else if (c.status === 'warn') score -= 5;
        break;
      case 'eop-cat':
        if (c.status === 'fail') score -= 30;
        else if (c.status === 'warn') score -= 10;
        break;
      case 'auth':
        if (c.status === 'fail') score -= 20;
        else if (c.status === 'warn') score -= 10;
        break;
      case 'reply-to':
        if (c.status === 'fail') score -= 20;
        else if (c.status === 'warn') score -= 5;
        break;
      case 'attach-double':
        if (c.status === 'fail') score -= 30;
        break;
      case 'attach-danger':
        if (c.status === 'fail') score -= 25;
        break;
      case 'attach-macro':
        if (c.status === 'warn') score -= 10;
        break;
      case 'attach-archive':
        if (c.status === 'warn') score -= 5;
        break;
      case 'attach-generic':
        if (c.status === 'warn') score -= 5;
        break;
      case 'subject':
        if (c.status === 'warn') score -= 5;
        break;
      case 'body':
        if (c.status === 'fail') score -= 25;
        else if (c.status === 'warn') score -= 10;
        break;
      case 'ext-domains':
        if (c.status === 'fail') score -= 25;
        else if (c.status === 'warn') score -= 5;
        break;
    }
  }

  var mismatchPenalty = 0;
  var suspectPenalty = 0;
  for (var j = 0; j < links.length; j++) {
    if (links[j].isMismatch) mismatchPenalty += 20;
    else if (links[j].isSuspicious) suspectPenalty += 10;
  }
  score -= Math.min(40, mismatchPenalty);
  score -= Math.min(30, suspectPenalty);

  return Math.max(0, Math.min(100, score));
}

function renderScore(integrity, links) {
  var score = computeScore(integrity, links);

  // Barre de score
  var bar = document.getElementById('score-bar');
  var val = document.getElementById('score-val');
  var fill = document.getElementById('score-fill');
  bar.style.display = 'block';
  val.textContent = score + ' / 100';

  // Couleurs par palier : 0-25 rouge vif, 25-50 rouge doux, 50-75 orange, 75-90 bleu, 90+ vert
  var color;
  if (score > 90)      { color = '#107c10'; }
  else if (score >= 75) { color = '#0078d4'; }
  else if (score >= 50) { color = '#d83b01'; }
  else if (score >= 25) { color = '#a4262c'; }
  else                  { color = '#7f1d1d'; }
  val.style.color = color;
  fill.style.width = score + '%';
  fill.style.background = color;

  var mismatchCount = links.filter(function(l){ return l.mismatch; }).length;

  // Banniere par palier
  if (score > 90) {
    setBanner('ok', '&#10004;', 'Confiance elevee (' + score + '/100)',
      links.length + ' lien(s) verifie(s), integrite OK');
  } else if (score >= 75) {
    setBanner('good', '&#10004;', 'Confiance correcte (' + score + '/100)',
      links.length + ' lien(s) verifie(s), quelques points mineurs');
  } else if (score >= 50) {
    var warnCount = 0;
    for (var i = 0; i < integrity.length; i++) {
      if (integrity[i].status !== 'pass') warnCount++;
    }
    warnCount += mismatchCount;
    setBanner('warn', '&#9888;', 'Vigilance recommandee (' + score + '/100)',
      warnCount + ' point(s) d\'attention detecte(s)');
  } else if (score >= 25) {
    setBanner('ko', '&#128680;', 'Risque eleve (' + score + '/100)',
      'Ce mail presente des signaux de phishing potentiel');
  } else {
    setBanner('danger', '&#128680;', 'Risque critique (' + score + '/100)',
      'Ce mail presente de forts signaux de phishing');
  }

  // Notification dans le mail (barre en haut du message)
  setMailNotification(score, links.length, mismatchCount);
}

function setMailNotification(score, totalLinks, suspectLinks) {
  var item = Office.context.mailbox.item;
  if (!item || !item.notificationMessages) return;

  // Supprimer l'ancienne notification si elle existe
  try { item.notificationMessages.removeAsync('linkchecker'); } catch(e) {}

  var msg = '';
  var type = Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage;
  var icon = 'Icon.16';
  var persistent = false;

  if (score > 90) {
    msg = 'Link Checker : Confiance elevee (' + score + '/100) — ' + totalLinks + ' lien(s) verifies';
  } else if (score >= 75) {
    msg = 'Link Checker : Confiance correcte (' + score + '/100) — ' + totalLinks + ' lien(s) verifies';
  } else if (score >= 50) {
    msg = 'Link Checker : Vigilance recommandee (' + score + '/100) — ' + suspectLinks + ' lien(s) suspect(s)';
    persistent = true;
  } else if (score >= 25) {
    msg = 'Link Checker : Risque eleve (' + score + '/100) — ' + suspectLinks + ' lien(s) suspect(s) detecte(s)';
    persistent = true;
  } else {
    msg = 'Link Checker : RISQUE CRITIQUE (' + score + '/100) — Ce mail presente de forts signaux de phishing';
    persistent = true;
  }

  item.notificationMessages.addAsync('linkchecker', {
    type: type,
    message: msg,
    icon: 'lc.Icon.16',
    persistent: persistent
  }, function(result) {
    // Silencieux en cas d'echec (certains clients ne supportent pas)
  });
}

function setBanner(cls, icon, msg, sub) {
  var b = document.getElementById('banner');
  b.className = cls === 'load' ? '' : cls;
  var h = cls === 'load' ? '<div class="spin"></div>' : '<span class="b-icon">' + icon + '</span>';
  h += '<div><div class="b-title">' + esc(msg) + '</div>';
  if (sub) h += '<div class="b-sub">' + esc(sub) + '</div>';
  h += '</div>';
  b.innerHTML = h;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function trunc(s, n) { return s.length <= n ? s : s.slice(0, n-1) + '...'; }
