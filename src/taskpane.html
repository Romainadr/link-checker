<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' https://appsforoffice.microsoft.com 'unsafe-inline';
               style-src 'self' 'unsafe-inline';
               img-src 'self' https: data:;
               connect-src 'none';
               object-src 'none';
               base-uri 'self'">
<title>Link Checker</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="core.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:#323130;background:#fff}

.hdr{padding:10px 14px;background:#f3f2f1;border-bottom:1px solid #edebe9;display:flex;align-items:center;gap:8px}
.hdr h1{font-size:14px;font-weight:600}

#banner{padding:10px 14px;border-left:4px solid #c8c6c4;background:#f3f2f1;color:#605e5c;display:flex;align-items:center;gap:8px;min-height:44px}
#banner.ok{border-color:#107c10;background:#dff6dd;color:#107c10}
#banner.good{border-color:#0078d4;background:#deecf9;color:#0078d4}
#banner.warn{border-color:#d83b01;background:#fff4ce;color:#8a6914}
#banner.ko{border-color:#a4262c;background:#fde7e9;color:#a4262c}
#banner.danger{border-color:#7f1d1d;background:#f5c6c6;color:#7f1d1d}
.b-icon{font-size:18px;flex-shrink:0}
.b-title{font-size:13px;font-weight:600}
.b-sub{font-size:11px;margin-top:2px;opacity:.85}

.spin{width:16px;height:16px;border:2px solid #edebe9;border-top-color:#0078d4;border-radius:50%;animation:r .7s linear infinite;flex-shrink:0}
@keyframes r{to{transform:rotate(360deg)}}

#btn{display:block;width:calc(100% - 28px);margin:8px 14px;padding:6px;background:#0078d4;color:#fff;border:none;border-radius:2px;cursor:pointer;font:500 13px 'Segoe UI',sans-serif}
#btn:hover{background:#106ebe}
#btn:disabled{background:#c8c6c4;cursor:default}
.score-bar{padding:8px 14px;display:none}
.score-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.score-label{font-size:11px;font-weight:600;color:#605e5c}
.score-value{font-size:13px;font-weight:700}
.score-track{height:6px;background:#edebe9;border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .4s ease}

.section-title{padding:10px 14px 4px;font-size:12px;font-weight:700;color:#0078d4;text-transform:uppercase;letter-spacing:0.5px;border-top:1px solid #edebe9;margin-top:6px}

.stats{display:flex;gap:12px;padding:6px 14px;font-size:11px;color:#605e5c}
.stats b{font-weight:600}

#integrity,#headers,#attachments,#list{padding:0 14px 8px}

.check{padding:7px 10px;margin-bottom:4px;border-radius:2px;font-size:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.4}
.check-icon{flex-shrink:0;font-size:14px;margin-top:1px}
.check.pass{background:#f3f2f1;border-left:3px solid #107c10}
.check.fail{background:#fde7e9;border-left:3px solid #a4262c}
.check.warn{background:#fff4ce;border-left:3px solid #d83b01}
.check-label{font-weight:600;font-size:11px;color:#605e5c}
.check-detail{font-size:11px;color:#323130;margin-top:2px}

.link{padding:8px;margin-bottom:4px;border-radius:2px;background:#f3f2f1;border-left:3px solid #107c10;font-size:12px}
.link.mismatch{border-color:#a4262c;background:#fff3f4}
.link.suspect{border-color:#d83b01;background:#fff8f0}
.lbl{font-weight:500;margin-bottom:2px;word-break:break-all}
.url{color:#605e5c;font-size:11px;word-break:break-all}
.real{color:#a4262c;font-size:11px;margin-top:4px;line-height:1.4}
.warn-line{color:#d83b01;font-size:11px;margin-top:3px;line-height:1.4}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;margin-top:4px}
.tag.ok{background:#dff6dd;color:#107c10}
.tag.ko{background:#fde7e9;color:#a4262c}
.tag.warn{background:#fff4ce;color:#8a6914}

.link-inspect{color:#605e5c;text-decoration:underline;text-decoration-style:dotted;word-break:break-all}
.link-inspect:hover{color:#0078d4}
.empty{padding:10px 14px;color:#605e5c;font-size:12px;font-style:italic}
.foot{padding:8px 14px;font-size:10px;color:#a19f9d;text-align:center}

/* Dark mode Outlook */
@media (prefers-color-scheme: dark) {
  body{background:#1f1f1f;color:#f3f2f1}
  .hdr{background:#2d2d2d;border-color:#3b3b3b}
  #banner{background:#2d2d2d;color:#c8c6c4}
  .section-title{border-color:#3b3b3b}
  .check.pass{background:#2d2d2d}
  .check-label{color:#c8c6c4}
  .check-detail{color:#f3f2f1}
  .link{background:#2d2d2d}
  .foot{color:#605e5c}
  .score-track{background:#3b3b3b}
}
</style>
</head>
<body>

<div class="hdr">
  <span style="font-size:16px">&#128279;</span>
  <h1>Link Checker</h1>
</div>

<div id="banner" role="status" aria-live="polite">
  <div class="spin"></div>
  <div><div class="b-title">Initialisation...</div></div>
</div>

<div class="score-bar" id="score-bar">
  <div class="score-header">
    <span class="score-label">Score de confiance</span>
    <span class="score-value" id="score-val">--</span>
  </div>
  <div class="score-track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
    <div class="score-fill" id="score-fill"></div>
  </div>
</div>

<button id="btn" disabled>&#8635; Re-analyser</button>

<div class="section-title">Integrite du mail</div>
<div id="integrity"></div>

<div class="section-title">Headers anti-spam</div>
<div id="headers"></div>

<div class="section-title">Pieces jointes</div>
<div id="attachments"></div>

<div class="section-title">Analyse des liens</div>
<div class="stats">
  <span>Liens : <b id="c-total">-</b></span>
  <span>OK : <b id="c-ok">-</b></span>
  <span>Suspects : <b id="c-ko" style="color:#a4262c">-</b></span>
</div>
<div id="list"></div>

<div class="foot">Analyse 100% locale &middot; aucune donnee transmise &middot; EMPIRYS &middot; v<span id="ver">1.1.0</span></div>

<script>
'use strict';

/* ===================================================================
   Link Checker — taskpane.js
   UI glue. Toute la logique d'analyse est dans core.js (window.LC).
   =================================================================== */

var currentItemId = null;
var runToken = 0;          // guard contre les runs concurrents
var supportsMailbox18 = false;

Office.onReady(function (info) {
  if (info.host !== Office.HostType.Outlook) return;

  try {
    supportsMailbox18 = Office.context.requirements.isSetSupported('Mailbox', '1.8');
  } catch (e) { supportsMailbox18 = false; }

  document.getElementById('btn').addEventListener('click', run);

  if (Office.context.mailbox.item) {
    currentItemId = Office.context.mailbox.item.itemId;
    run();
  }

  /* Pinning : l'utilisateur navigue d'un mail a l'autre sans fermer le taskpane. */
  if (Office.context.mailbox.addHandlerAsync) {
    Office.context.mailbox.addHandlerAsync(Office.EventType.ItemChanged, function () {
      var item = Office.context.mailbox.item;
      var newId = item ? item.itemId : null;
      if (newId && newId !== currentItemId) {
        currentItemId = newId;
        run();
      }
    });
  }
});

/* -- Run principal ------------------------------------------------- */

function run() {
  var myToken = ++runToken;
  var btn = document.getElementById('btn');
  btn.disabled = true;
  setBanner('load', null, 'Analyse en cours...', null);
  ['list', 'integrity', 'headers', 'attachments'].forEach(function (id) {
    document.getElementById(id).innerHTML = '';
  });
  document.getElementById('score-bar').style.display = 'none';

  var item = Office.context.mailbox.item;
  if (!item) {
    btn.disabled = false;
    setBanner('ko', '&#10007;', 'Aucun element selectionne', null);
    return;
  }

  var senderEmail = '';
  var subject = '';
  try {
    if (item.from) senderEmail = (item.from.emailAddress || '').toLowerCase();
    subject = item.subject || '';
  } catch (e) {}

  var bodyHtml = null;
  var mimeHeaders = null;
  var pending = 2;

  function onPartReady() {
    pending--;
    if (pending > 0) return;
    if (myToken !== runToken) return;  /* un run plus recent est en cours */

    btn.disabled = false;

    if (!bodyHtml && bodyHtml !== '') {
      setBanner('ko', '&#10007;', 'Impossible de lire le contenu', null);
      return;
    }

    var result = window.LC.analyze({
      from: senderEmail,
      subject: subject,
      bodyHtml: bodyHtml,
      mimeHeaders: mimeHeaders,
      item: item
    });

    renderChecks('integrity', result.integrity);
    renderChecks('headers', result.headers);
    renderChecks('attachments', result.attachments);
    renderLinks(result.links);
    renderScore(result.score, result.links);
  }

  item.body.getAsync(Office.CoercionType.Html, function (r) {
    bodyHtml = (r.status === Office.AsyncResultStatus.Succeeded) ? (r.value || '') : null;
    onPartReady();
  });

  if (supportsMailbox18 && item.getAllInternetHeadersAsync) {
    item.getAllInternetHeadersAsync(function (r) {
      mimeHeaders = (r.status === Office.AsyncResultStatus.Succeeded) ? r.value : null;
      onPartReady();
    });
  } else {
    mimeHeaders = null;
    onPartReady();
  }
}

/* -- Rendu generique des checks ------------------------------------ */

function renderChecks(containerId, checks) {
  var icons = { pass: '&#10003;', warn: '&#9888;', fail: '&#10007;' };
  var h = '';
  for (var i = 0; i < checks.length; i++) {
    var c = checks[i];
    h += '<div class="check ' + c.status + '">';
    h += '<span class="check-icon" aria-hidden="true">' + icons[c.status] + '</span>';
    h += '<div>';
    h += '<div class="check-label">' + esc(c.label) + '</div>';
    h += '<div class="check-detail">' + esc(c.detail) + '</div>';
    h += '</div></div>';
  }
  document.getElementById(containerId).innerHTML = h;
}

/* -- Rendu : liens ------------------------------------------------- */

function renderLinks(links) {
  var mm = links.filter(function (l) { return l.mismatch; });
  var total = links.length, okN = total - mm.length, koN = mm.length;

  document.getElementById('c-total').textContent = total;
  document.getElementById('c-ok').textContent = okN;
  document.getElementById('c-ko').textContent = koN;

  if (total === 0) {
    document.getElementById('list').innerHTML = '<div class="empty">Pas de lien a analyser.</div>';
    return;
  }

  var sorted = mm.concat(links.filter(function (l) { return !l.mismatch; }));
  var h = '';
  for (var i = 0; i < sorted.length; i++) {
    var l = sorted[i];
    var cls = l.mismatch ? (l.isMismatch ? ' mismatch' : ' suspect') : '';
    h += '<div class="link' + cls + '">';
    h += '<div class="lbl">' + esc(trunc(l.text, 80)) + '</div>';

    /* Filet schema : on ne rend un <a> que si http(s) — core.js le garantit
       deja, on reverifie ici pour defense en profondeur. */
    var safeHref = window.LC.isSchemeSafe(l.href) ? l.href : '#';

    if (l.mismatch) {
      h += '<div class="url">&rarr; <a href="' + escAttr(safeHref) + '" target="_blank" rel="noopener noreferrer" class="link-inspect" title="Ouvrir pour inspecter">' + esc(trunc(l.href, 120)) + '</a></div>';
    } else {
      h += '<div class="url">&rarr; ' + esc(trunc(l.href, 120)) + '</div>';
    }
    if (l.safelinks) {
      h += '<div class="url" style="color:#0078d4;font-style:italic">&#128737; URL deballee depuis SafeLinks</div>';
    }
    if (l.isMismatch) {
      h += '<div class="real">&#9888; ' + esc(l.reason) + '</div>';
      h += '<span class="tag ko">MISMATCH</span>';
    } else if (l.isSuspicious) {
      for (var w = 0; w < l.warnings.length; w++) {
        h += '<div class="warn-line">&#9888; ' + esc(l.warnings[w]) + '</div>';
      }
      h += '<span class="tag warn">SUSPECT</span>';
    } else {
      h += '<span class="tag ok">OK</span>';
    }
    h += '</div>';
  }
  document.getElementById('list').innerHTML = h;
}

/* -- Score + banniere + notification ------------------------------- */

function renderScore(score, links) {
  var bar = document.getElementById('score-bar');
  var val = document.getElementById('score-val');
  var fill = document.getElementById('score-fill');
  var track = bar.querySelector('.score-track');
  bar.style.display = 'block';
  val.textContent = score + ' / 100';
  track.setAttribute('aria-valuenow', String(score));

  var color;
  if (score > 90)       color = '#107c10';
  else if (score >= 75) color = '#0078d4';
  else if (score >= 50) color = '#d83b01';
  else if (score >= 25) color = '#a4262c';
  else                  color = '#7f1d1d';
  val.style.color = color;
  fill.style.width = score + '%';
  fill.style.background = color;

  var mismatchCount = links.filter(function (l) { return l.mismatch; }).length;

  if (score > 90) {
    setBanner('ok', '&#10004;', 'Confiance elevee (' + score + '/100)',
      links.length + ' lien(s) verifie(s), integrite OK');
  } else if (score >= 75) {
    setBanner('good', '&#10004;', 'Confiance correcte (' + score + '/100)',
      links.length + ' lien(s) verifie(s), quelques points mineurs');
  } else if (score >= 50) {
    setBanner('warn', '&#9888;', 'Vigilance recommandee (' + score + '/100)',
      mismatchCount + ' lien(s) suspect(s) detecte(s)');
  } else if (score >= 25) {
    setBanner('ko', '&#128680;', 'Risque eleve (' + score + '/100)',
      'Ce mail presente des signaux de phishing potentiel');
  } else {
    setBanner('danger', '&#128680;', 'Risque critique (' + score + '/100)',
      'Ce mail presente de forts signaux de phishing');
  }

  setMailNotification(score, links.length, mismatchCount);
}

function setMailNotification(score, totalLinks, suspectLinks) {
  var item = Office.context.mailbox.item;
  if (!item || !item.notificationMessages) return;

  var msg, persistent = false;
  if (score > 90) {
    msg = 'Link Checker : Confiance elevee (' + score + '/100) — ' + totalLinks + ' lien(s) verifies';
  } else if (score >= 75) {
    msg = 'Link Checker : Confiance correcte (' + score + '/100) — ' + totalLinks + ' lien(s) verifies';
  } else if (score >= 50) {
    msg = 'Link Checker : Vigilance recommandee (' + score + '/100) — ' + suspectLinks + ' lien(s) suspect(s)';
    persistent = true;
  } else if (score >= 25) {
    msg = 'Link Checker : Risque eleve (' + score + '/100) — ' + suspectLinks + ' lien(s) suspect(s) detecte(s)';
    persistent = true;
  } else {
    msg = 'Link Checker : RISQUE CRITIQUE (' + score + '/100) — forts signaux de phishing';
    persistent = true;
  }
  if (msg.length > 150) msg = msg.substring(0, 147) + '...';

  /* Icon resid : lc.Icon.16 dans V1_1, Icon.16 en V1_0.
     replaceAsync est idempotent, pas besoin de remove prealable. */
  var iconResid = supportsMailbox18 ? 'lc.Icon.16' : 'Icon.16';

  var notif = {
    type: Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
    icon: iconResid,
    message: msg,
    persistent: persistent
  };
  try {
    item.notificationMessages.replaceAsync('linkchecker', notif, function () {});
  } catch (e) {}
}

function setBanner(cls, icon, msg, sub) {
  var b = document.getElementById('banner');
  b.className = (cls === 'load') ? '' : cls;
  var h = (cls === 'load') ? '<div class="spin"></div>' : '<span class="b-icon" aria-hidden="true">' + icon + '</span>';
  h += '<div><div class="b-title">' + esc(msg) + '</div>';
  if (sub) h += '<div class="b-sub">' + esc(sub) + '</div>';
  h += '</div>';
  b.innerHTML = h;
}

/* -- Helpers UI ---------------------------------------------------- */

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escAttr(s) { return esc(s); }
function trunc(s, n) { s = String(s || ''); return s.length <= n ? s : s.slice(0, n - 1) + '...'; }

/* Expose la version LC dans le footer */
document.addEventListener('DOMContentLoaded', function () {
  if (window.LC && window.LC.VERSION) {
    var v = document.getElementById('ver');
    if (v) v.textContent = window.LC.VERSION;
  }
});
</script>
</body>
</html>
