<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Link Checker</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<!-- ?v= : cache-buster, a incrementer a chaque bump de LC.VERSION -->
<script src="core.js?v=1.3.4"></script>
<style>
/* -- Empirys / CyberOne brand palette -- */
:root{
  /* Vermillon orange (avant : #C8102E) */
  --emp-red:#E0341A;
  --emp-red-dark:#B82A15;
  --emp-red-light:#FCEAE6;
  --emp-dark:#1A1A2E;
  --emp-gray:#4A4A5A;
  --emp-gray-light:#F5F5F7;
  --emp-border:#E0E0E6;
  --emp-green:#2E7D32;
  --emp-green-bg:#E8F5E9;
  --emp-orange:#E65100;
  --emp-orange-bg:#FFF3E0;
  --emp-red-bg:#FFEBEE;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:var(--emp-dark);background:#fff}

.hdr{padding:12px 14px;background:var(--emp-red);display:flex;align-items:center;gap:10px}
.hdr h1{font-size:14px;font-weight:600;color:#fff}
.hdr span{color:#fff}

#banner{padding:10px 14px;border-left:4px solid var(--emp-border);background:var(--emp-gray-light);color:var(--emp-gray);display:flex;align-items:center;gap:8px;min-height:44px}
#banner.ok{border-color:var(--emp-green);background:var(--emp-green-bg);color:var(--emp-green)}
#banner.good{border-color:#0078d4;background:#deecf9;color:#0078d4}
#banner.warn{border-color:var(--emp-orange);background:var(--emp-orange-bg);color:var(--emp-orange)}
#banner.ko{border-color:#C62828;background:#FFCDD2;color:#B71C1C}
#banner.danger{border-color:#7f1d1d;background:#FFCDD2;color:#7f1d1d}
.b-icon{font-size:18px;flex-shrink:0}
.b-title{font-size:13px;font-weight:600}
.b-sub{font-size:11px;margin-top:2px;opacity:.85}

.spin{width:16px;height:16px;border:2px solid var(--emp-border);border-top-color:var(--emp-red);border-radius:50%;animation:r .7s linear infinite;flex-shrink:0}
@keyframes r{to{transform:rotate(360deg)}}

#btn{display:block;width:calc(100% - 28px);margin:8px 14px;padding:7px;background:var(--emp-red);color:#fff;border:none;border-radius:3px;cursor:pointer;font:600 13px 'Segoe UI',sans-serif;letter-spacing:0.3px}
#btn:hover{background:var(--emp-red-dark)}
#btn:disabled{background:#c8c6c4;cursor:default}
#btn-report{display:none;width:calc(100% - 28px);margin:0 14px 8px;padding:7px;background:transparent;color:var(--emp-red);border:1px solid var(--emp-red);border-radius:3px;cursor:pointer;font:600 13px 'Segoe UI',sans-serif;letter-spacing:0.3px}
#btn-report:hover{background:var(--emp-red-light)}
.score-bar{padding:8px 14px;display:none}
.score-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.score-label{font-size:11px;font-weight:600;color:var(--emp-gray)}
.score-value{font-size:13px;font-weight:700}
.score-track{height:6px;background:var(--emp-border);border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .4s ease}

.section-title{padding:10px 14px 4px;font-size:11px;font-weight:700;color:var(--emp-red);text-transform:uppercase;letter-spacing:0.8px;border-top:1px solid var(--emp-border);margin-top:6px}

.stats{display:flex;gap:12px;padding:6px 14px;font-size:11px;color:var(--emp-gray)}
.stats b{font-weight:600}

#integrity,#headers,#attachments,#list{padding:0 14px 8px}

.check{padding:7px 10px;margin-bottom:4px;border-radius:3px;font-size:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.4}
.check-icon{flex-shrink:0;font-size:14px;margin-top:1px}
.check.pass{background:var(--emp-gray-light);border-left:3px solid var(--emp-green)}
.check.fail{background:var(--emp-red-bg);border-left:3px solid var(--emp-red)}
.check.warn{background:var(--emp-orange-bg);border-left:3px solid var(--emp-orange)}
.check-label{font-weight:600;font-size:11px;color:var(--emp-gray)}
.check-detail{font-size:11px;color:var(--emp-dark);margin-top:2px}

.link{padding:8px;margin-bottom:4px;border-radius:3px;background:var(--emp-gray-light);border-left:3px solid var(--emp-green);font-size:12px}
.link.mismatch{border-color:var(--emp-red);background:var(--emp-red-bg)}
.link.suspect{border-color:var(--emp-orange);background:var(--emp-orange-bg)}
.lbl{font-weight:500;margin-bottom:2px;word-break:break-all}
.occ{font-weight:400;color:var(--emp-gray);font-size:11px;white-space:nowrap}
.url{color:var(--emp-gray);font-size:11px;word-break:break-all}
.real{color:var(--emp-red);font-size:11px;margin-top:4px;line-height:1.4}
.warn-line{color:var(--emp-orange);font-size:11px;margin-top:3px;line-height:1.4}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;margin-top:4px}
.tag.ok{background:var(--emp-green-bg);color:var(--emp-green)}
.tag.ko{background:var(--emp-red-bg);color:var(--emp-red)}
.tag.warn{background:var(--emp-orange-bg);color:var(--emp-orange)}

.link-inspect{color:var(--emp-gray);text-decoration:underline;text-decoration-style:dotted;word-break:break-all}
.link-inspect:hover{color:var(--emp-red)}
.empty{padding:10px 14px;color:var(--emp-gray);font-size:12px;font-style:italic}
.foot{padding:10px 14px;font-size:10px;color:#999;text-align:center;border-top:1px solid var(--emp-border);margin-top:4px}

/* Dark mode Outlook */
@media (prefers-color-scheme: dark) {
  body{background:#1f1f1f;color:#f3f2f1}
  .hdr{background:#2d2d2d;border-color:#3b3b3b}
  #banner{background:#2d2d2d;color:#c8c6c4}
  .section-title{border-color:#3b3b3b}
  .check.pass{background:#2d2d2d}
  .check-label{color:#c8c6c4}
  .check-detail{color:#f3f2f1}
  .link{background:#2d2d2d}
  .foot{color:#605e5c}
  .score-track{background:#3b3b3b}
}
</style>
</head>
<body>

<div class="hdr">
  <span style="font-size:16px">&#128279;</span>
  <h1>Link Checker</h1>
</div>

<div id="banner" role="status" aria-live="polite">
  <div class="spin"></div>
  <div><div class="b-title">Initialisation...</div></div>
</div>

<div class="score-bar" id="score-bar">
  <div class="score-header">
    <span class="score-label">Score de confiance</span>
    <span class="score-value" id="score-val">--</span>
  </div>
  <div class="score-track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
    <div class="score-fill" id="score-fill"></div>
  </div>
</div>

<button id="btn" disabled>&#8635; Re-analyser</button>
<button id="btn-report">&#9873; Signaler ce mail a Empirys</button>

<div class="section-title">Integrite du mail</div>
<div id="integrity"></div>

<div class="section-title">Headers anti-spam</div>
<div id="headers"></div>

<div class="section-title">Pieces jointes</div>
<div id="attachments"></div>

<div class="section-title">Analyse des liens</div>
<div class="stats">
  <span>Liens : <b id="c-total">-</b></span>
  <span>OK : <b id="c-ok">-</b></span>
  <span>Suspects : <b id="c-ko" style="color:var(--emp-red)">-</b></span>
</div>
<div id="list"></div>

<div class="foot">Analyse 100% locale &middot; aucune donnee transmise<br>&epsilon;mpirys &middot; CyberOne &middot; v<span id="ver">1.3.4</span></div>

<script>
'use strict';

/* ===================================================================
   Link Checker — taskpane.js
   UI glue. Toute la logique d'analyse est dans core.js (window.LC).
   =================================================================== */

var currentItemId = null;
var runToken = 0;          // guard contre les runs concurrents
var supportsMailbox18 = false;
var ANALYZE_TIMEOUT_MS = 20000;
var lastAnalysis = null;   // resume de la derniere analyse (bouton Signaler)

/* Config multi-tenant :
   1. auto-org : le domaine de la boite de l'utilisateur devient domaine interne
   2. config client statique optionnelle chargee via ?client=<slug> (clients/<slug>.json)
   Ne bloque jamais l'analyse : timeout 3s puis defaults. */
function loadClientConfig(done) {
  try {
    var up = Office.context.mailbox.userProfile;
    var em = (up && up.emailAddress) ? String(up.emailAddress) : '';
    var at = em.indexOf('@');
    if (at > 0) window.LC.configure({ orgDomains: [em.slice(at + 1).toLowerCase()] });
  } catch (e) {}

  var m = /[?&]client=([a-z0-9\-]+)/i.exec(location.search);
  if (!m || typeof fetch !== 'function') { done(); return; }
  var settled = false;
  function finish() { if (!settled) { settled = true; done(); } }
  setTimeout(finish, 3000);
  fetch('../clients/' + m[1].toLowerCase() + '.json', { cache: 'no-store' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (cfg) { if (cfg) window.LC.configure(cfg); finish(); })
    .catch(finish);
}

Office.onReady(function (info) {
  if (info.host !== Office.HostType.Outlook) return;

  try {
    supportsMailbox18 = Office.context.requirements.isSetSupported('Mailbox', '1.8');
  } catch (e) { supportsMailbox18 = false; }

  document.getElementById('btn').addEventListener('click', run);
  document.getElementById('btn-report').addEventListener('click', reportMail);

  loadClientConfig(function () {
    if (Office.context.mailbox.item) {
      currentItemId = Office.context.mailbox.item.itemId;
      run();
    } else {
      setBanner('ko', '&#10007;', 'Aucun element selectionne', 'Ouvrez un mail puis relancez l\'analyse.');
      document.getElementById('btn').disabled = false;
    }
  });

  /* Pinning : l'utilisateur navigue d'un mail a l'autre sans fermer le taskpane. */
  if (Office.context.mailbox.addHandlerAsync) {
    Office.context.mailbox.addHandlerAsync(Office.EventType.ItemChanged, function () {
      var item = Office.context.mailbox.item;
      var newId = item ? item.itemId : null;
      if (newId && newId !== currentItemId) {
        currentItemId = newId;
        run();
      }
    });
  }
});

/* -- Run principal ------------------------------------------------- */

function run() {
  var myToken = ++runToken;
  var btn = document.getElementById('btn');
  btn.disabled = true;
  setBanner('load', null, 'Analyse en cours...', null);
  ['list', 'integrity', 'headers', 'attachments'].forEach(function (id) {
    document.getElementById(id).innerHTML = '';
  });
  document.getElementById('score-bar').style.display = 'none';
  document.getElementById('btn-report').style.display = 'none';
  lastAnalysis = null;

  var item = Office.context.mailbox.item;
  if (!item) {
    btn.disabled = false;
    setBanner('ko', '&#10007;', 'Aucun element selectionne', null);
    return;
  }

  var senderEmail = '';
  var senderDisplayName = '';
  var subject = '';
  try {
    if (item.from) {
      senderEmail = (item.from.emailAddress || '').toLowerCase();
      senderDisplayName = (item.from.displayName || '');
    }
    subject = item.subject || '';
  } catch (e) {}

  var bodyHtml = null;
  var mimeHeaders = null;
  var pending = 2;
  var usedTextFallback = false;

  /* Watchdog : jamais de spinner infini si un callback Office ne revient pas
     (observe sur Outlook mobile). */
  var watchdog = setTimeout(function () {
    if (myToken !== runToken || pending <= 0) return;
    pending = -999;
    btn.disabled = false;
    setBanner('ko', '&#10007;', 'Delai d\'analyse depasse',
      'Le client Outlook n\'a pas renvoye le contenu du mail. Reessayez.');
  }, ANALYZE_TIMEOUT_MS);

  function onPartReady() {
    pending--;
    if (pending > 0) return;
    if (pending < 0) return;           /* watchdog deja declenche */
    if (myToken !== runToken) return;  /* un run plus recent est en cours */

    clearTimeout(watchdog);
    btn.disabled = false;

    if (!bodyHtml && bodyHtml !== '') {
      setBanner('ko', '&#10007;', 'Impossible de lire le contenu', null);
      return;
    }

    try {
      var result = window.LC.analyze({
        from: senderEmail,
        fromDisplayName: senderDisplayName,
        subject: subject,
        bodyHtml: bodyHtml,
        mimeHeaders: mimeHeaders,
        item: item
      });

      renderChecks('integrity', result.integrity);
      renderChecks('headers', result.headers);
      renderChecks('attachments', result.attachments);
      renderLinks(result.links);
      if (usedTextFallback) {
        document.getElementById('list').insertAdjacentHTML('afterbegin',
          '<div class="empty">Contenu HTML indisponible sur ce client : analyse sur texte brut, liens non verifiables.</div>');
      }
      renderScore(result.score, result.links);

      /* Bouton Signaler : uniquement si l'API le permet (Mailbox 1.6+, pas mobile) */
      lastAnalysis = {
        score: result.score,
        sender: senderEmail,
        subject: subject,
        total: result.links.length,
        suspects: result.links.filter(function (l) { return l.mismatch; }).length
      };
      if (Office.context.mailbox.displayNewMessageForm && item.itemId) {
        document.getElementById('btn-report').style.display = 'block';
      }
    } catch (e) {
      /* une erreur JS ne doit jamais laisser le spinner tourner */
      setBanner('ko', '&#10007;', 'Erreur pendant l\'analyse',
        (e && e.message) ? String(e.message) : 'Erreur inattendue');
    }
  }

  item.body.getAsync(Office.CoercionType.Html, function (r) {
    if (r.status === Office.AsyncResultStatus.Succeeded) {
      bodyHtml = r.value || '';
      onPartReady();
    } else {
      /* Fallback mobile : certains clients ne renvoient pas le HTML.
         On retombe sur le texte brut (analyse partielle, sans liens). */
      try {
        item.body.getAsync(Office.CoercionType.Text, function (r2) {
          if (r2.status === Office.AsyncResultStatus.Succeeded) {
            usedTextFallback = true;
            bodyHtml = '<div>' + esc(r2.value || '') + '</div>';
          } else {
            bodyHtml = null;
          }
          onPartReady();
        });
      } catch (e2) { bodyHtml = null; onPartReady(); }
    }
  });

  if (supportsMailbox18 && item.getAllInternetHeadersAsync) {
    item.getAllInternetHeadersAsync(function (r) {
      mimeHeaders = (r.status === Office.AsyncResultStatus.Succeeded) ? r.value : null;
      onPartReady();
    });
  } else {
    mimeHeaders = null;
    onPartReady();
  }
}

/* -- Rendu generique des checks ------------------------------------ */

function renderChecks(containerId, checks) {
  var icons = { pass: '&#10003;', warn: '&#9888;', fail: '&#10007;' };
  var h = '';
  for (var i = 0; i < checks.length; i++) {
    var c = checks[i];
    h += '<div class="check ' + c.status + '">';
    h += '<span class="check-icon" aria-hidden="true">' + icons[c.status] + '</span>';
    h += '<div>';
    h += '<div class="check-label">' + esc(c.label) + '</div>';
    h += '<div class="check-detail">' + esc(c.detail) + '</div>';
    h += '</div></div>';
  }
  document.getElementById(containerId).innerHTML = h;
}

/* -- Rendu : liens ------------------------------------------------- */

function renderLinks(links) {
  var mm = links.filter(function (l) { return l.mismatch; });
  var total = links.length, okN = total - mm.length, koN = mm.length;

  document.getElementById('c-total').textContent = total;
  document.getElementById('c-ok').textContent = okN;
  document.getElementById('c-ko').textContent = koN;

  if (total === 0) {
    document.getElementById('list').innerHTML = '<div class="empty">Pas de lien a analyser.</div>';
    return;
  }

  var sorted = mm.concat(links.filter(function (l) { return !l.mismatch; }));
  var h = '';
  for (var i = 0; i < sorted.length; i++) {
    var l = sorted[i];
    var cls = l.mismatch ? (l.isMismatch ? ' mismatch' : ' suspect') : '';
    h += '<div class="link' + cls + '">';
    h += '<div class="lbl">' + esc(trunc(l.text, 80)) +
      (l.occurrences > 1 ? ' <span class="occ">(&times;' + l.occurrences + ' dans le mail)</span>' : '') + '</div>';

    /* Filet schema : on ne rend un <a> que si http(s) — core.js le garantit
       deja, on reverifie ici pour defense en profondeur. */
    var safeHref = window.LC.isSchemeSafe(l.href) ? l.href : '#';

    if (l.mismatch) {
      h += '<div class="url">&rarr; <a href="' + escAttr(safeHref) + '" target="_blank" rel="noopener noreferrer" class="link-inspect" title="Ouvrir pour inspecter">' + esc(trunc(l.href, 120)) + '</a></div>';
    } else {
      h += '<div class="url">&rarr; ' + esc(trunc(l.href, 120)) + '</div>';
    }
    if (l.safelinks) {
      h += '<div class="url" style="color:var(--emp-red);font-style:italic">&#128737; URL deballee depuis SafeLinks</div>';
    }
    if (l.isMismatch) {
      h += '<div class="real">&#9888; ' + esc(l.reason) + '</div>';
      h += '<span class="tag ko">MISMATCH</span>';
    } else if (l.isSuspicious) {
      for (var w = 0; w < l.warnings.length; w++) {
        h += '<div class="warn-line">&#9888; ' + esc(l.warnings[w]) + '</div>';
      }
      h += '<span class="tag warn">SUSPECT</span>';
    } else {
      h += '<span class="tag ok">OK</span>';
    }
    h += '</div>';
  }
  document.getElementById('list').innerHTML = h;
}

/* -- Score + banniere + notification ------------------------------- */

function renderScore(score, links) {
  var bar = document.getElementById('score-bar');
  var val = document.getElementById('score-val');
  var fill = document.getElementById('score-fill');
  var track = bar.querySelector('.score-track');
  bar.style.display = 'block';
  val.textContent = score + ' / 100';
  track.setAttribute('aria-valuenow', String(score));

  var color;
  if (score > 90)       color = '#2E7D32';
  else if (score >= 75) color = '#0078d4';
  else if (score >= 50) color = '#E65100';
  else if (score >= 25) color = '#C62828';
  else                  color = '#7f1d1d';
  val.style.color = color;
  fill.style.width = score + '%';
  fill.style.background = color;

  var mismatchCount = links.filter(function (l) { return l.mismatch; }).length;

  if (score > 90) {
    setBanner('ok', '&#10004;', 'Confiance elevee (' + score + '/100)',
      links.length + ' lien(s) verifie(s), integrite OK');
  } else if (score >= 75) {
    setBanner('good', '&#10004;', 'Confiance correcte (' + score + '/100)',
      links.length + ' lien(s) verifie(s), quelques points mineurs');
  } else if (score >= 50) {
    setBanner('warn', '&#9888;', 'Vigilance recommandee (' + score + '/100)',
      mismatchCount + ' lien(s) suspect(s) detecte(s)');
  } else if (score >= 25) {
    setBanner('ko', '&#128680;', 'Risque eleve (' + score + '/100)',
      'Ce mail presente des signaux de phishing potentiel');
  } else {
    setBanner('danger', '&#128680;', 'Risque critique (' + score + '/100)',
      'Ce mail presente de forts signaux de phishing');
  }

  setMailNotification(score, links.length, mismatchCount);
}

function setMailNotification(score, totalLinks, suspectLinks) {
  var item = Office.context.mailbox.item;
  if (!item || !item.notificationMessages) return;

  /* Couleurs : la bannière est rendue par Outlook, pas personnalisable.
     Deux leviers seulement :
     - InformationalMessage : fond neutre + notre icone bouclier (vert/orange)
     - ErrorMessage : bandeau rouge natif (score < 50). N'accepte ni icon
       ni persistent (exception sinon), et ne persiste pas entre sessions. */
  var notif;
  if (score >= 50) {
    var msg, persistent = false, iconResid;
    if (score >= 75) {
      msg = 'Link Checker : confiance ' + (score > 90 ? 'elevee' : 'correcte') + ', ' + totalLinks + ' lien(s) verifie(s)';
      iconResid = 'lc.Notif.Ok';
    } else {
      msg = 'Link Checker : vigilance recommandee, ' + suspectLinks + ' lien(s) suspect(s)';
      iconResid = 'lc.Notif.Warn';
      persistent = true;
    }
    if (msg.length > 150) msg = msg.substring(0, 147) + '...';
    notif = {
      type: Office.MailboxEnums.ItemNotificationMessageType.InformationalMessage,
      icon: iconResid,
      message: msg,
      persistent: persistent
    };
  } else {
    var em = (score >= 25)
      ? 'Link Checker : risque eleve, signaux de phishing, ' + suspectLinks + ' lien(s) suspect(s)'
      : 'Link Checker : RISQUE CRITIQUE, forts signaux de phishing, ' + suspectLinks + ' lien(s) suspect(s)';
    if (em.length > 150) em = em.substring(0, 147) + '...';
    notif = { type: Office.MailboxEnums.ItemNotificationMessageType.ErrorMessage, message: em };
  }

  try {
    item.notificationMessages.replaceAsync('linkchecker', notif, function (r) {
      /* Vieux Outlook (bloc V1_0) : le resid lc.* n'existe pas, retry Icon.16 */
      if (r && r.status === Office.AsyncResultStatus.Failed && notif.icon && notif.icon !== 'Icon.16') {
        notif.icon = 'Icon.16';
        try { item.notificationMessages.replaceAsync('linkchecker', notif, function () {}); } catch (e) {}
      }
    });
  } catch (e) {}
}

function setBanner(cls, icon, msg, sub) {
  var b = document.getElementById('banner');
  b.className = (cls === 'load') ? '' : cls;
  var h = (cls === 'load') ? '<div class="spin"></div>' : '<span class="b-icon" aria-hidden="true">' + icon + '</span>';
  h += '<div><div class="b-title">' + esc(msg) + '</div>';
  if (sub) h += '<div class="b-sub">' + esc(sub) + '</div>';
  h += '</div>';
  b.innerHTML = h;
}

/* -- Signalement a l'equipe securite -------------------------------- */

function reportMail() {
  var mb = Office.context.mailbox;
  var item = mb.item;
  if (!mb.displayNewMessageForm || !item || !item.itemId) return;

  var a = lastAnalysis || {};
  var soc = (window.LC && window.LC.getReportEmail) ? window.LC.getReportEmail() : 'soc@empirys.com';
  var body =
    'Mail signale via Link Checker.<br><br>' +
    '<b>Expediteur :</b> ' + esc(a.sender || 'inconnu') + '<br>' +
    '<b>Sujet :</b> ' + esc(a.subject || '(sans sujet)') + '<br>' +
    '<b>Score Link Checker :</b> ' + (a.score != null ? a.score + '/100' : 'n/a') + '<br>' +
    '<b>Liens analyses :</b> ' + (a.total || 0) + ', dont suspects : ' + (a.suspects || 0) + '<br><br>' +
    'Le mail original est joint a ce message.';

  try {
    mb.displayNewMessageForm({
      toRecipients: [soc],
      subject: '[Link Checker] Signalement : ' + (a.subject || '(sans sujet)'),
      htmlBody: body,
      attachments: [{ type: 'item', name: a.subject || 'mail signale', itemId: item.itemId }]
    });
  } catch (e) {}
}

/* -- Helpers UI ---------------------------------------------------- */

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escAttr(s) { return esc(s); }
function trunc(s, n) { s = String(s || ''); return s.length <= n ? s : s.slice(0, n - 1) + '...'; }

/* Expose la version LC dans le footer */
document.addEventListener('DOMContentLoaded', function () {
  if (window.LC && window.LC.VERSION) {
    var v = document.getElementById('ver');
    if (v) v.textContent = window.LC.VERSION;
  }
});
</script>
